window.INLINE_COURSE={"meta": {"storageKey": "axyon-python-v1", "themeKey": "axyon-python-theme", "title": "PyLab", "brand": "axyon.dev", "icon": "🐍", "tagline": "Derinlemesine Python Öğren", "description": "Her konuda sadece ne değil, <strong>neden</strong> ve <strong>nasıl</strong> öğreniyorsun. Alternatifleri, tuzakları ve gerçek kullanımları göreceksin.", "themeColor": "#f0a500", "codeRunner": "skulpt", "version": "1.0.0"}, "modules": [{"id": "m0", "label": "Başlangıç", "icon": "🚀", "color": "#7eb8f7", "lessons": [{"id": "print", "icon": "🖨️", "locked": false, "title": "print() Fonksiyonu", "desc": "Ekrana bir şeyler yazdırmak — Python'ın sana seslenmesi.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>print() nedir? — Bilgisayarın sana konuşması</h3></div>\n    <p>Düşün ki bir hesap makinesi yaptın. Sonucu hesapladı ama ekranda hiçbir şey çıkmıyor. Kafayı yersin, değil mi? İşte <code>print()</code> tam bu yüzden var — yazdığın kodun <strong>sonucunu ekrana çıkarır</strong>, yoksa Python sessizce çalışır, kimse bir şey görmez.</p>\n    <div class=\"box tip\"><span class=\"box-icon\">💡</span><span><strong>En basit haliyle:</strong> <code>print(\"Merhaba Dünya\")</code> — parantez aç, tırnak içine ne yazmak istiyorsan yaz, parantez kapat. Çalıştır. Bitti.</span></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">ilk_adim.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"fn\">print</span>(<span class=\"st\">\"Merhaba Dünya\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Ben Python'um!\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"nm\">42</span>)          <span class=\"cm\"># Sayılar da çalışır</span><br>\n<span class=\"fn\">print</span>(<span class=\"nm\">3.14</span>)        <span class=\"cm\"># Ondalıklı da</span><br>\n<span class=\"fn\">print</span>(<span class=\"kw\">True</span>)        <span class=\"cm\"># Hatta evet/hayır bile</span></div><textarea class=\"cb-src\" style=\"display:none\">print(\"Merhaba Dunya\")\nprint(\"Ben Python'um!\")\nprint(42)\nprint(3.14)\nprint(True)</textarea></div>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Neden fonksiyon oldu?</strong> Python 2'de <code>print \"merhaba\"</code> diye yazılıyordu. Python 3'te parantezli fonksiyon yapıldı. Böylece <code>sep</code>, <code>end</code> gibi ekstra seçenekler verilebiliyor. Fonksiyon olmasa bu mümkün olmazdı.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Birden fazla şey yazdırmak — sep parametresi</h3></div>\n    <p>Virgülle birden fazla şey verince Python hepsini yan yana yazar — arasına otomatik <strong>boşluk</strong> koyar. Ama bu boşluğu değiştirmek istersen <code>sep</code> parametresini kullanırsın. <em>sep</em> = separator = ayırıcı demek.</p>\n    <p>Günlük hayat örneği: İsim ve soyisim yazdırıyorsun. Aralarına tire mi, boşluk mu, virgül mi istiyorsun? Sen seçiyorsun:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">sep_ornekleri.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"fn\">print</span>(<span class=\"st\">\"Ahmet\"</span>, <span class=\"st\">\"Yılmaz\"</span>)                   <span class=\"cm\"># Ahmet Yılmaz</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Ahmet\"</span>, <span class=\"st\">\"Yılmaz\"</span>, sep=<span class=\"st\">\"-\"</span>)          <span class=\"cm\"># Ahmet-Yılmaz</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Ahmet\"</span>, <span class=\"st\">\"Yılmaz\"</span>, sep=<span class=\"st\">\", \"</span>)         <span class=\"cm\"># Ahmet, Yılmaz</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Ahmet\"</span>, <span class=\"st\">\"Yılmaz\"</span>, sep=<span class=\"st\">\"\"</span>)           <span class=\"cm\"># AhmetYılmaz</span><br><br>\n<span class=\"cm\"># Klasör yolu gibi yazdır: usr/local/bin</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"usr\"</span>, <span class=\"st\">\"local\"</span>, <span class=\"st\">\"bin\"</span>, sep=<span class=\"st\">\"/\"</span>)     <span class=\"cm\"># usr/local/bin</span><br><br>\n<span class=\"cm\"># Tarih formatı: 2024.04.21</span><br>\n<span class=\"fn\">print</span>(<span class=\"nm\">2024</span>, <span class=\"nm\">4</span>, <span class=\"nm\">21</span>, sep=<span class=\"st\">\".\"</span>)              <span class=\"cm\"># 2024.4.21</span></div><textarea class=\"cb-src\" style=\"display:none\">print(\"Ahmet\", \"Yilmaz\")\nprint(\"Ahmet\", \"Yilmaz\", sep=\"-\")\nprint(\"Ahmet\", \"Yilmaz\", sep=\", \")\nprint(\"Ahmet\", \"Yilmaz\", sep=\"\")\nprint(\"usr\", \"local\", \"bin\", sep=\"/\")\nprint(2024, 4, 21, sep=\".\")</textarea></div>\n    <div class=\"box tip\"><span class=\"box-icon\">💡</span><span><code>sep=\"\"</code> (boş string) verince araya hiçbir şey konmaz. Kelimeler bitişik çıkar.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Her print neden yeni satıra geçiyor? — end parametresi</h3></div>\n    <p>Her <code>print()</code> yazdıktan sonra <strong>otomatik olarak bir alt satıra geçer</strong>. Neden? Çünkü gizlice <code>end=\"\\n\"</code> parametresi çalışır. <code>\\n</code> \"yeni satır\" demek. Bunu değiştirebilirsin:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">end_ornekleri.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Normalde her print ayrı satır:</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Birinci\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"İkinci\"</span>)<br><br>\n<span class=\"cm\"># end=\"\" ile aynı satırda devam:</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Yükleniyor\"</span>, end=<span class=\"st\">\"\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\".\"</span>, end=<span class=\"st\">\"\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\".\"</span>, end=<span class=\"st\">\"\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\".\"</span>)   <span class=\"cm\"># → Yükleniyor...</span><br><br>\n<span class=\"cm\"># 1'den 5'e yan yana yaz:</span><br>\n<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">1</span>, <span class=\"nm\">6</span>):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(i, end=<span class=\"st\">\"  \"</span>)   <span class=\"cm\"># → 1  2  3  4  5</span></div><textarea class=\"cb-src\" style=\"display:none\">print(\"Birinci\")\nprint(\"Ikinci\")\nprint(\"---\")\nprint(\"Yukleniyor\", end=\"\")\nprint(\".\", end=\"\")\nprint(\".\", end=\"\")\nprint(\".\")\nprint(\"---\")\nfor i in range(1, 6):\n    print(i, end=\"  \")\nprint()</textarea></div>\n    <div class=\"box tip\"><span class=\"box-icon\">💡</span><span><code>end=\" \"</code> gibi herhangi bir şey yazabilirsin. Boşluk, virgül, emoji bile koyabilirsin!</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Kaçış karakterleri — Yazılamayan karakterler nasıl yazılır?</h3></div>\n    <p>String içinde bazı şeyleri doğrudan yazamazsın — mesela yeni satır. Klavyede Enter'a bassak string biter! Bunun için <strong>ters eğik çizgi (\\)</strong> ile başlayan özel kodlar var:</p>\n    <table class=\"cmp-table\">\n      <tr><th>Kod</th><th>Ne yapar?</th><th>Örnek çıktı</th></tr>\n      <tr><td><code>\\n</code></td><td>Yeni satıra geç</td><td class=\"ok\">Satır 1↵Satır 2</td></tr>\n      <tr><td><code>\\t</code></td><td>Tab (girinti) ekle</td><td class=\"ok\">İsim:&nbsp;&nbsp;&nbsp;&nbsp;Ahmet</td></tr>\n      <tr><td><code>\\\"</code></td><td>Tırnak içinde tırnak</td><td class=\"ok\">O dedi ki: \"Harika!\"</td></tr>\n      <tr><td><code>\\\\</code></td><td>Tek ters eğik çizgi</td><td class=\"ok\">C:\\Users\\Ahmet</td></tr>\n    </table>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">kacis_karakterler.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"fn\">print</span>(<span class=\"st\">\"Satır 1\\nSatır 2\\nSatır 3\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Ad:\\tAhmet\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"O dedi ki: \\\"Python harika!\\\"\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"C:\\\\Users\\\\Ahmet\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">print(\"Satir 1\\nSatir 2\\nSatir 3\")\nprint(\"Ad:\\tAhmet\")\nprint('O dedi ki: \"Python harika!\"')\nprint(\"C:\\\\Users\\\\Ahmet\")</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>f-string — Değişkeni metnin içine göm</h3></div>\n    <p>Bir değişkenin değerini metin içinde göstermek istersen <strong>f-string</strong> kullanırsın. String'in başına <code>f</code> harfi koy, sonra süslü parantez içine değişken adını yaz:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">fstring.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">isim = <span class=\"st\">\"Zeynep\"</span><br>\nyas = <span class=\"nm\">17</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Merhaba {isim}! {yas} yaşındasın.\"</span>)<br>\n<span class=\"cm\"># → Merhaba Zeynep! 17 yaşındasın.</span><br><br>\n<span class=\"cm\"># Hesap da yapabilirsin:</span><br>\nfiyat = <span class=\"nm\">45</span><br>\nadet = <span class=\"nm\">3</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Toplam: {fiyat * adet} TL\"</span>)<br>\n<span class=\"cm\"># → Toplam: 135 TL</span></div><textarea class=\"cb-src\" style=\"display:none\">isim = \"Zeynep\"\nyas = 17\nprint(f\"Merhaba {isim}! {yas} yasinda.\")\nfiyat = 45\nadet = 3\nprint(f\"Toplam: {fiyat * adet} TL\")</textarea></div>\n    <div class=\"box tip\"><span class=\"box-icon\">💡</span><span>f-string içinde süslü parantez <code>{}</code> içine sadece değişken değil, her türlü hesaplama da yazabilirsin: <code>f\"{2 + 2}\"</code>, <code>f\"{isim.upper()}\"</code>...</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--green)\"></div><h3>Gerçek hayat: Kafe makbuzu yazdır</h3></div>\n    <p>Şimdi hepsini bir araya getirerek gerçekçi bir çıktı yapalım. print() ile düzgün hizalanmış bir makbuz:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">makbuz.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"fn\">print</span>(<span class=\"st\">\"=\" * 30</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{'KAFE MAKBUZU':^30}\"</span>)   <span class=\"cm\"># ^30 = 30 karakterde ortala</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"=\" * 30</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{'Espresso':<15}{'35 TL':>12}\"</span>)   <span class=\"cm\"># < sola, > sağa hizala</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{'Cheesecake':<15}{'75 TL':>12}\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{'Su':<15}{'10 TL':>12}\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"-\" * 30</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{'TOPLAM':<15}{'120 TL':>12}\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"=\" * 30</span>)</div><textarea class=\"cb-src\" style=\"display:none\">print(\"=\" * 30)\nprint(f\"{'KAFE MAKBUZU':^30}\")\nprint(\"=\" * 30)\nprint(f\"{'Espresso':<15}{'35 TL':>12}\")\nprint(f\"{'Cheesecake':<15}{'75 TL':>12}\")\nprint(f\"{'Su':<15}{'10 TL':>12}\")\nprint(\"-\" * 30)\nprint(f\"{'TOPLAM':<15}{'120 TL':>12}\")\nprint(\"=\" * 30)</textarea></div>\n    <div class=\"box deep\"><span class=\"box-icon\">🧠</span><span><strong>Hizalama sırları:</strong> <code>:^30</code> — 30 karakterde ortala. <code>:<15</code> — 15 karakterde sola hizala. <code>:>12</code> — 12 karakterde sağa hizala. Bu sayede her satır aynı sütunda hizalanır, düzgün tablo çıkar.</span></div>\n    <div class=\"box alt\"><span class=\"box-icon\">⚖️</span><span><strong>Gerçek projede print() yerine ne kullanmalısın?</strong> Büyük yazılımlarda <code>logging</code> modülü tercih edilir. Çünkü <code>print()</code>i üretim ortamında kolayca kapatabilirsin, zaman damgası ekleyebilirsin, hata seviyesi belirleyebilirsin. Ama öğrenmek ve denemek için <code>print()</code> her zaman doğru araç!</span></div>\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "print(\"Ahmet\", \"Yılmaz\", sep=\"-\") çıktısı nedir?", "opts": ["Ahmet Yılmaz", "Ahmet-Yılmaz", "AhmetYılmaz", "Ahmet, Yılmaz"], "ans": 1, "exp": "sep parametresi argümanlar arasına konur. sep=\"-\" deyince araya tire gelir."}, {"q": "Her print() neden yeni satıra geçer?", "opts": ["Python kuralı böyle", "end=\"\\n\" varsayılan değeri yüzünden", "sep parametresi yüzünden", "Otomatik değil, elle geçiyoruz"], "ans": 1, "exp": "print() içinde gizlice end=\"\\n\" çalışır. \\n yeni satır demek. end=\"\" yazarsan bu olmaz."}, {"q": "print(\"Yükleniyor\", end=\"\") ne yapar?", "opts": ["Hiçbir şey yazmaz", "Yükleniyor yazar, sonra yeni satıra geçmez", "Yükleniyor\\n yazar", "Hata verir"], "ans": 1, "exp": "end=\"\" olunca satır sonu eklenmez. Bir sonraki print aynı satırda devam eder."}, {"q": "f-string'de değişkeni nereye yazarsın?", "opts": ["Köşeli parantez içine []", "Süslü parantez içine {}", "Düz parantez içine ()", "Tırnak dışına"], "ans": 1, "exp": "f\"...\" içinde {degisken} şeklinde yazarsın. Python otomatik olarak değeri yerleştirir."}, {"q": "print(\"=\" * 10) ne çıktı verir?", "opts": ["= * 10", "10 tane = yan yana", "Hata", "= 10"], "ans": 1, "exp": "\"=\" * 10 ifadesi \"==========\" (10 eşittir işareti) üretir. Sonra print onu ekrana yazar."}], "fills": [{"code": "<span class=\"fn\">print</span>(<span class=\"st\">\"A\"</span>, <span class=\"st\">\"B\"</span>, sep=<input class=\"blank\" data-ans='\"-\"' placeholder=\"?\" style=\"width:40px\">)  <span class=\"cm\"># A-B</span>", "hint": "Tire: tırnak içinde - işareti"}, {"code": "<span class=\"fn\">print</span>(<span class=\"st\">\"Yükleniyor\"</span>, end=<input class=\"blank\" data-ans='\"\"' placeholder=\"?\" style=\"width:35px\">)  <span class=\"cm\"># yeni satır yok</span>", "hint": "Boş string: iki tırnak yan yana"}, {"code": "<span class=\"fn\">print</span>(<span class=\"st\">\"Satır1<input class=\"blank\" data-ans=\"\\n\" placeholder=\"?\" style=\"width:28px\">Satır2\"</span>)  <span class=\"cm\"># iki satır</span>", "hint": "Yeni satır kaçış karakteri: ters eğik çizgi + n"}, {"code": "<span class=\"fn\">print</span>(<span class=\"st\">\"=\" <input class=\"blank\" data-ans=\"*\" placeholder=\"?\" style=\"width:25px\"> <span class=\"nm\">20</span></span>)  <span class=\"cm\"># 20 tane =</span>", "hint": "String çarpma: yıldız işareti"}, {"code": "isim = <span class=\"st\">\"Ali\"</span>\n<span class=\"fn\">print</span>(<span class=\"st\"><input class=\"blank\" data-ans=\"f\" placeholder=\"?\" style=\"width:22px\">\"{isim} merhaba\"</span>)", "hint": "f-string için string başına koyulan harf"}], "drag": [{"code": "print(\"A\", \"B\", <span class=\"hl\">___</span>=\"-\")", "ans": "sep", "opts": ["sep", "end", "file", "flush", "tab"], "exp": "sep = argümanlar arasındaki ayırıcı"}, {"code": "print(\"Yükleniyor\", <span class=\"hl\">___</span>=\"\")", "ans": "end", "opts": ["end", "sep", "file", "flush", "stop"], "exp": "end = satır sonuna eklenen karakter"}, {"code": "<span class=\"hl\">___</span>(42)  # ekrana yazar", "ans": "print", "opts": ["print", "input", "len", "type", "range"], "exp": "print() değerleri ekrana yazar"}, {"code": "print(1, 2, 3)  # varsayılan sep = <span class=\"hl\">___</span>", "ans": " ", "opts": [" ", "-", "\\n", "", ","], "exp": "Varsayılan ayırıcı tek boşluktur"}, {"code": "# f-string: <span class=\"hl\">___</span>isim<span class=\"hl\">___</span> şeklinde", "ans": "{", "opts": ["{", "[", "(", "<", "#"], "exp": "f-string içinde değişkeni süslü parantez { } arasına yazarsın"}], "code": {"task": "Bir arkadaşına mesaj yaz! Adını, yaşını ve favori konuyu kullanarak güzel hizalanmış bir tanıtım kartı yazdır. print(), f-string ve hizalama (:^, :<, :>) kullan.", "starter": "# Tanıtım Kartı — Aşağıdaki adımları tamamla:\n# 1) ad, yas, konu değişkenlerini tanımla\n# 2) print(\"=\" * 32) ile üst çizgi çiz\n# 3) f-string ile ad, yas ve konu yazdır\n# 4) Hizalama için :^32 (ortala), :<15 (sola), :>15 (sağa) kullan\n\n", "hint": "f\"{metin:^32}\" — 32 karakterde ortala. f\"{metin:<12}\" — 12 karakterde sola. f\"{deger:>18}\" — 18 karakterde sağa hizala.", "checkFn": "(code)=>{\n      const hasPrint=(code.match(/print/g)||[]).length>=4;\n      const hasFmt=code.includes('f\"')||code.includes(\"f'\");\n      const hasAlign=code.includes(':<')||code.includes(':>')||code.includes(':^');\n      const hasVar=/[a-z_]+ ?= ?[\"']/.test(code);\n      let p=(hasPrint?3:0)+(hasFmt?3:0)+(hasAlign?2:0)+(hasVar?2:0);\n      return{pts:p,max:10,ok:p>=6,msg:p>=9?'Mükemmel kart! 🎉':p>=6?'Güzel iş, hizalama çok düzgün!':'f-string ve :< :> :^ hizalamayı dene.'};\n    }"}}, {"id": "input", "icon": "⌨️", "locked": true, "title": "input() ve Yorumlar", "desc": "Kullanıcıdan veri al, koduna açıklama ekle — ve neden her zaman str döner?", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>input() — Neden Her Zaman String?</h3></div>\n    <p>Python tasarımcıları bir karar vermek zorundaydı: kullanıcı bir şey yazdığında Python ne tür veri varsaymalı? Sayı mı? Metin mi? Tarih mi? Cevabı bilemezdi. Bu yüzden <strong>her zaman metin (str)</strong> döndürür — ne yazılırsa yazılsın.</p>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Neden str?</strong> Kullanıcı \"Ahmet\" de girebilir, \"42\" de girebilir. Python ikisini de okumak zorundadır. String her şeyi kapsayan ortak payda. Sonra sen, hangi tipe ihtiyacın varsa o tipe çevirirsin.</span></div>\n\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">input_str.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># input() her zaman str döndürür</span><br>\nsayi_str = <span class=\"fn\">input</span>(<span class=\"st\">\"Bir sayı gir: \"</span>)   <span class=\"cm\"># Kullanıcı: 42</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">type</span>(sayi_str))              <span class=\"cm\"># &lt;class 'str'&gt;</span><br>\n<span class=\"fn\">print</span>(sayi_str + sayi_str)          <span class=\"cm\"># \"4242\" ← birleşme! toplama değil!</span><br><br>\n<span class=\"cm\"># Sayıya çevirmek gerekiyor</span><br>\nsayi_int = <span class=\"fn\">int</span>(sayi_str)<br>\n<span class=\"fn\">print</span>(sayi_int + sayi_int)          <span class=\"cm\"># 84 ← gerçek toplama</span></div><textarea class=\"cb-src\" style=\"display:none\"># Skulpt'te input olmadığı için degiskene atıyoruz\nsayi_str = \"42\"\nprint(type(sayi_str))\nprint(sayi_str + sayi_str)\nsayi_int = int(sayi_str)\nprint(sayi_int + sayi_int)</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Tip Dönüşüm Zinciri — int(input(...))</h3></div>\n    <p>Standart kalıp: <code>int(input(\"...\"))</code>. Önce <code>input()</code> string getirir, <code>int()</code> sayıya çevirir. Parantezler iç içedir:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">tip_cevirme.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Tam sayı almak</span><br>\nyas = <span class=\"fn\">int</span>(<span class=\"fn\">input</span>(<span class=\"st\">\"Yaşın: \"</span>))<br><br>\n<span class=\"cm\"># Ondalıklı sayı almak</span><br>\nboy = <span class=\"fn\">float</span>(<span class=\"fn\">input</span>(<span class=\"st\">\"Boyun (metre): \"</span>))<br><br>\n<span class=\"cm\"># String kalsın (isim, şehir vs)</span><br>\nisim = <span class=\"fn\">input</span>(<span class=\"st\">\"Adın: \"</span>)  <span class=\"cm\"># dönüşüm gerekmez</span><br><br>\n<span class=\"cm\"># Test için sabit değer kullanalım</span><br>\nyas = <span class=\"nm\">25</span><br>\nboy = <span class=\"nm\">1.78</span><br>\nisim = <span class=\"st\">\"Zeynep\"</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{isim}, {yas} yaş, {boy}m\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">yas = 25\nboy = 1.78\nisim = \"Zeynep\"\nprint(f\"{isim}, {yas} yas, {boy}m\")\n# int() ne yapar:\nprint(type(int(\"42\")))\n# float() ne yapar:\nprint(type(float(\"3.14\")))</textarea></div>\n\n    <div class=\"box warn\"><span class=\"box-icon\">⚠️</span><span><strong>int(\"3.14\") HATA verir!</strong> Ondalıklı yazılmış bir stringi <code>int()</code> ile çeviremezsin. Doğru yol: önce <code>float(\"3.14\")</code>, sonra <code>int(3.14)</code>. Yani <code>int(float(\"3.14\"))</code>.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>Yorum Satırları — Sadece Açıklama Değil</h3></div>\n    <p>Yorumlar sadece \"şu satır şunu yapıyor\" diye açıklamak için değildir. Profesyoneller yorumu şu durumlarda kullanır:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">yorumlar_derinlemesine.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># 1. NEDEN yapıldığını açıkla (NASIL değil, kod zaten gösteriyor)</span><br>\nyas += <span class=\"nm\">1</span>  <span class=\"cm\"># doğum günü geçti, yaşı artır</span><br><br>\n<span class=\"cm\"># 2. Beklenmedik davranışı uyar</span><br>\nsonuc = <span class=\"fn\">int</span>(fiyat * <span class=\"nm\">1.18</span>)  <span class=\"cm\"># KDV: float hassasiyet için int alındı</span><br><br>\n<span class=\"cm\"># 3. Kodu geçici olarak devre dışı bırak</span><br>\n<span class=\"cm\"># print(\"debug:\", x)  ← test için pasife alındı</span><br><br>\n<span class=\"cm\"># 4. TODO/FIXME/NOTE işaretleri</span><br>\n<span class=\"cm\"># TODO: veritabanından al, şimdilik sabit</span><br>\nkullanici = <span class=\"st\">\"admin\"</span></div><textarea class=\"cb-src\" style=\"display:none\"># Yorum satirlari asagida\nyas = 20\nyas += 1  # dogum gunu gecti, yasi artir\nfiyat = 100\nsonuc = int(fiyat * 1.18)  # KDV dahil fiyat\nprint(\"KDV dahil:\", sonuc)\nkullanici = \"admin\"  # TODO: veritabanindan al\nprint(\"Kullanici:\", kullanici)</textarea></div>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Kötü yorum nedir?</strong> <code>x = x + 1  # x'e 1 ekle</code> — bu gereksiz, kodu okuyan zaten görüyor. İyi yorum: <code>x = x + 1  # her request için sayacı artır</code>. Neden yapıldığını yaz, ne yapıldığını değil.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Çok Satırlı Yorum: \"\"\" vs #</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">cok_satirli.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\">\"\"\"</span><br>\n<span class=\"cm\">Bu fonksiyon BMI hesaplar.</span><br>\n<span class=\"cm\">Parametre: agirlik (kg), boy (metre)</span><br>\n<span class=\"cm\">Döndürür: float (BMI değeri)</span><br>\n<span class=\"cm\">\"\"\"</span><br><br>\n<span class=\"cm\"># Alternatif: ardışık # satırları</span><br>\n<span class=\"cm\"># Bu fonksiyon BMI hesaplar.</span><br>\n<span class=\"cm\"># Parametre: agirlik (kg), boy (metre)</span></div><textarea class=\"cb-src\" style=\"display:none\"># Uclu tirnak yorum degil, string'dir!\ns = \"\"\"\nBu bir string\nbircok satirli\n\"\"\"\nprint(s)\nprint(type(s))</textarea></div>\n    <div class=\"box alt\"><span class=\"box-icon\">⚖️</span><span><strong>\"\"\"...\"\"\" teknik olarak yorum DEĞİLDİR.</strong> Çok satırlı bir string'dir. Sadece değişkene atanmadığında Python onu görmezden gelir. Gerçek çok satırlı yorumlar için ya <code>#</code> kullan ya da IDE'nin blok yorum özelliğini. Fonksiyon/sınıf açıklaması için ise <code>\"\"\"</code> kullanmak standarttır (docstring).</span></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "Kullanıcı \"42\" yazsa bile input() ne döndürür?", "opts": ["int (42)", "float (42.0)", "str (\"42\")", "Girişe göre değişir"], "ans": 2, "exp": "input() HER ZAMAN str döndürür. Tip dönüşümünü sen yapmalısın."}, {"q": "\"3.14\" stringini int'e çevirmek için doğru yol?", "opts": ["int(\"3.14\")", "float(int(\"3.14\"))", "int(float(\"3.14\"))", "str(int(\"3.14\"))"], "ans": 2, "exp": "Önce float'a çevir (3.14), sonra int'e (3). Direkt int(\"3.14\") hata verir."}, {"q": "Hangisi KÖTÜ bir yorum örneğidir?", "opts": ["# KDV için 1.18 çarpıyoruz", "# i'ye 1 ekle", "# Kullanıcı girişini temizle", "# Listeyi alfabetik sırala"], "ans": 1, "exp": "\"i'ye 1 ekle\" kodu tekrar söyler. İyi yorum NEDEN'i açıklar, NASIL'ı değil."}, {"q": "int(input(\"Sayı: \")) ne yapar?", "opts": ["Önce int'e çevirir, sonra input alır", "Input'u çalıştırır, dönen string'i int'e çevirir", "Sadece int girmesine izin verir", "Hata verir"], "ans": 1, "exp": "İçteki input() önce çalışır, string döndürür. Sonra int() o stringi sayıya çevirir."}, {"q": "int(input()) yerine int(float(input())) ne zaman gerekir?", "opts": ["Her zaman", "Kullanıcı 3.14 girebilirse", "Hiçbir zaman", "Sadece sayılarda"], "ans": 1, "exp": "int(\"3.14\") hata verir; önce float, sonra int: int(float(\"3.14\"))=3"}], "fills": [{"code": "isim = <input class=\"blank\" data-ans=\"input\" placeholder=\"?\" style=\"width:55px\">(<span class=\"st\">\"Adın: \"</span>)", "hint": "Klavyeden veri alan fonksiyon"}, {"code": "yas = <input class=\"blank\" data-ans=\"int\" placeholder=\"?\" style=\"width:40px\">(<span class=\"fn\">input</span>(<span class=\"st\">\"Yaşın: \"</span>))  <span class=\"cm\"># string→int</span>", "hint": "Tam sayıya çeviren fonksiyon"}, {"code": "<input class=\"blank\" data-ans=\"#\" placeholder=\"?\" style=\"width:22px\"> Bu satır Python tarafından atlanır", "hint": "Yorum başlatan tek karakter"}, {"code": "boy = <input class=\"blank\" data-ans=\"float\" placeholder=\"?\" style=\"width:50px\">(<span class=\"fn\">input</span>(<span class=\"st\">\"Boyun: \"</span>))  <span class=\"cm\"># ondalıklı</span>", "hint": "Ondalıklı sayıya çeviren fonksiyon"}, {"code": "yas = <span class=\"fn\">int</span>(<input class=\"blank\" data-ans=\"input\" placeholder=\"?\" style=\"width:55px\">(<span class=\"st\">\"Yaşın: \"</span>))", "hint": "Klavye okuma fonksiyonu"}], "drag": [{"code": "sayi = <span class=\"hl\">___</span>(input(\"Sayı: \"))", "ans": "int", "opts": ["int", "str", "float", "bool", "len"], "exp": "int() string'i tam sayıya çevirir"}, {"code": "boy = <span class=\"hl\">___</span>(input(\"Boy: \"))", "ans": "float", "opts": ["float", "int", "str", "bool", "type"], "exp": "float() ondalıklı sayıya çevirir"}, {"code": "type(input(\"...\"))  →  <span class=\"hl\">___</span>", "ans": "str", "opts": ["str", "int", "float", "bool", "None"], "exp": "input() her zaman str döndürür"}, {"code": "<span class=\"hl\">___</span> Bu satır Python yorum", "ans": "#", "opts": ["#", "//", "/*", "--", "**"], "exp": "# karakteri ile başlayan satır atlanır"}, {"code": "int(<span class=\"hl\">___</span>(\"3.14\"))  →  3", "ans": "float", "opts": ["float", "int", "str", "bool", "round"], "exp": "Önce float'a çevir (3.14), sonra int'e (3)"}], "code": {"task": "Değişkende isim, yaş ve doğum yılı sakla. f-string ile \"Merhaba [isim]! [yaş] yaşındasın ve [yil] yılında doğdun.\" yaz. Bonus: 2050'de kaç yaşında olacağını hesapla.", "starter": "# Değişkenlerle çalış (normalde input() kullanılır)\nisim = \"Kendi adın\"\nyas = 20\nyil = 2005\n\n# Mesajı yazdır\nprint(f\"Merhaba {isim}!\")\nprint(f\"{yas} yaşındasın ve {yil} yılında doğdun.\")\n\n# Bonus: 2050'de kaç yaşında?\n", "hint": "2050'deki yaş: gelecek_yas = 2050 - yil  (2050 - doğum yılı)", "checkFn": "(code)=>{\n      const hasFStr=code.includes('f\"') || code.includes(\"f'\");\n      const hasPrint=(code.match(/print/g)||[]).length>=2;\n      const hasName=code.includes('isim') || code.includes('name');\n      const hasBonus=code.includes('2050');\n      let p=(hasFStr?3:0)+(hasPrint?3:0)+(hasName?2:0)+(hasBonus?2:0);\n      return {pts:p,max:10,ok:p>=5,msg:p>=8?'Süper! 🚀':p>=5?'İyi iş!':'f-string ve en az 2 print() kullan.'};\n    }"}}]}, {"id": "m1", "label": "Temel Yapılar", "icon": "🏗️", "color": "#b39ddb", "lessons": [{"id": "variables", "icon": "📦", "locked": true, "title": "Değişkenler", "desc": "İsim-nesne ilişkisi, bellek modeli ve Python'ın dinamik tiplemesi.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>Değişken Nedir Gerçekten? — Kutu Değil, Etiket</h3></div>\n    <p>Çoğu dilde değişken \"içinde veri olan kutu\" gibi anlatılır. Python'da bu analoji <strong>yanlıştır</strong>. Python'da değişkenler bir kutunun etiketi değil, nesneye yapıştırılmış bir <em>isim etiketi</em>dir.</p>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Neden önemli?</strong> <code>a = [1,2,3]; b = a; b.append(4)</code> yazarsan <em>hem</em> <code>a</code> <em>hem de</em> <code>b</code> değişir! Çünkü ikisi de aynı listeye işaret eder. \"Kutu\" modelinde bu beklenmedik davranış görünür. \"Etiket\" modelinde mantıklıdır.</span></div>\n\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">etiket_modeli.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">a = <span class=\"nm\">42</span>       <span class=\"cm\"># \"a\" etiketi 42 nesnesine yapıştırıldı</span><br>\nb = a        <span class=\"cm\"># \"b\" etiketi de aynı 42 nesnesine</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">id</span>(a) == <span class=\"fn\">id</span>(b))  <span class=\"cm\"># True — aynı nesne!</span><br><br>\na = <span class=\"nm\">100</span>      <span class=\"cm\"># \"a\" artık 100 nesnesine → b hâlâ 42'de</span><br>\n<span class=\"fn\">print</span>(a, b)  <span class=\"cm\"># 100 42</span><br><br>\n<span class=\"cm\"># id() nesnenin bellekteki adresini verir</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">id</span>(<span class=\"nm\">42</span>))   <span class=\"cm\"># Her çalıştırmada farklı olabilir</span></div><textarea class=\"cb-src\" style=\"display:none\">a = 42\nb = a\nprint(id(a) == id(b))\na = 100\nprint(a, b)\nprint(\"a'nin adresi:\", id(a))\nprint(\"b'nin adresi:\", id(b))</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Değişken Kuralları ve Gelenekler</h3></div>\n    <table class=\"cmp-table\">\n      <tr><th>Kural</th><th>Geçerli ✅</th><th>Geçersiz ❌</th><th>Açıklama</th></tr>\n      <tr><td>Rakamla başlamaz</td><td><code>sayi1</code></td><td><code class=\"bad\">1sayi</code></td><td>Python sayı sanır</td></tr>\n      <tr><td>Tire kullanılmaz</td><td><code>kullanici_adi</code></td><td><code class=\"bad\">kullanici-adi</code></td><td>Çıkarma işlemi zanneder</td></tr>\n      <tr><td>Boşluk yasak</td><td><code>toplam_puan</code></td><td><code class=\"bad\">toplam puan</code></td><td>İki ayrı isim gibi okur</td></tr>\n      <tr><td>Anahtar kelime yasak</td><td><code>for_list</code></td><td><code class=\"bad\">for</code></td><td>Python'a özel anlamı var</td></tr>\n    </table>\n    <div class=\"box tip\"><span class=\"box-icon\">💡</span><span><strong>Gelenek (zorunlu değil):</strong> Python geliştiricileri <code>snake_case</code> kullanır: <code>kullanici_adi</code>, <code>toplam_fiyat</code>. Java gibi dillerin <code>camelCase</code>'i Python'da geleneksizdir. Büyük harfle başlamak sınıf ismini çağrıştırır.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>Dinamik Tipleme — Python'ın Felsefesi</h3></div>\n    <p>Python'da değişkenin tipi yoktur. <em>Nesnenin</em> tipi vardır. <code>x</code> değişkeni önce int tutabilir, sonra string tutabilir — bu Python'ın felsefesidir:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">dinamik_tip.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">x = <span class=\"nm\">42</span>           <span class=\"cm\"># x şu an int nesnesine bakıyor</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">type</span>(x))  <span class=\"cm\"># &lt;class 'int'&gt;</span><br><br>\nx = <span class=\"st\">\"merhaba\"</span>   <span class=\"cm\"># x artık str nesnesine bakıyor</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">type</span>(x))  <span class=\"cm\"># &lt;class 'str'&gt;</span><br><br>\nx = <span class=\"nm\">3.14</span>        <span class=\"cm\"># x artık float nesnesine bakıyor</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">type</span>(x))  <span class=\"cm\"># &lt;class 'float'&gt;</span></div><textarea class=\"cb-src\" style=\"display:none\">x = 42\nprint(type(x))\nx = \"merhaba\"\nprint(type(x))\nx = 3.14\nprint(type(x))</textarea></div>\n    <div class=\"box alt\"><span class=\"box-icon\">⚖️</span><span><strong>Dinamik tiplemenin dezavantajı:</strong> Büyük projelerde <code>x</code>'in ne tuttuğu belirsizleşir. Python 3.5+ ile <strong>tip ipuçları</strong> (type hints) geldi: <code>x: int = 42</code>. Python bunları çalışma anında kontrol etmez ama IDE ve araçlar uyarı verebilir.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Çoklu Atama, Güncelleme ve Takas</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">guncelleme.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Tek satırda çoklu atama</span><br>\nx, y, z = <span class=\"nm\">10</span>, <span class=\"nm\">20</span>, <span class=\"nm\">30</span><br>\n<span class=\"fn\">print</span>(x, y, z)    <span class=\"cm\"># 10 20 30</span><br><br>\n<span class=\"cm\"># Hepsine aynı değer</span><br>\na = b = c = <span class=\"nm\">0</span><br><br>\n<span class=\"cm\"># Takas — Python'a özgü şıklık</span><br>\nx, y = y, x<br>\n<span class=\"fn\">print</span>(x, y)        <span class=\"cm\"># 20 10</span><br><br>\n<span class=\"cm\"># Güncelleme kısaltmaları</span><br>\npuan = <span class=\"nm\">50</span><br>\npuan += <span class=\"nm\">10</span>   <span class=\"cm\"># puan = puan + 10 → 60</span><br>\npuan -= <span class=\"nm\">5</span>    <span class=\"cm\"># 55</span><br>\npuan *= <span class=\"nm\">2</span>    <span class=\"cm\"># 110</span><br>\npuan //= <span class=\"nm\">3</span>   <span class=\"cm\"># 36 (tam böl)</span></div><textarea class=\"cb-src\" style=\"display:none\">x, y, z = 10, 20, 30\nprint(x, y, z)\na = b = c = 0\nprint(a, b, c)\nx, y = y, x\nprint(\"Takas:\", x, y)\npuan = 50\npuan += 10\npuan -= 5\npuan *= 2\npuan //= 3\nprint(\"Puan:\", puan)</textarea></div>\n    <div class=\"box deep\"><span class=\"box-icon\">🧠</span><span><strong>Takas nasıl çalışır?</strong> <code>x, y = y, x</code> Python önce sağ tarafı değerlendirir: <code>(y, x)</code> bir tuple oluşturur. Sonra sol tarafa açar. Bu yüzden geçici değişken gerekmez. Başka dillerde <code>temp = x; x = y; y = temp</code> lazımdır.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>del — Değişkeni Sil</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">del_ornek.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">x = <span class=\"nm\">100</span><br>\n<span class=\"fn\">print</span>(x)     <span class=\"cm\"># 100</span><br>\n<span class=\"kw\">del</span> x         <span class=\"cm\"># \"x\" etiketi kaldırıldı</span><br>\n<span class=\"cm\"># print(x)   # NameError: x tanımlı değil</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"x silindi\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">x = 100\nprint(x)\ndel x\nprint(\"x silindi\")\n# Artik x yok</textarea></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "Python'da değişken bir \"kutu\" değil ne gibidir?", "opts": ["Dosya", "Nesneye yapıştırılmış etiket", "Bellek adresi", "Tip tanımı"], "ans": 1, "exp": "Python'da değişkenler nesneye işaret eden isimlerdir. Birden fazla isim aynı nesneye bakabilir."}, {"q": "a = [1,2,3]; b = a; b.append(4) → a ne olur?", "opts": ["[1,2,3] kalır", "[1,2,3,4] olur", "Hata", "None olur"], "ans": 1, "exp": "a ve b aynı listeye işaret eder. b üzerinden değişiklik a'ya da yansır. \"Etiket\" modeli bunu açıklar."}, {"q": "x, y = y, x ne yapar?", "opts": ["Hata verir", "x ve y'yi takas eder", "Her ikisini 0 yapar", "Sadece x'i değiştirir"], "ans": 1, "exp": "Python önce sağdaki (y,x) tuple'ını oluşturur, sonra x ve y'ye atar. Geçici değişken gerekmez."}, {"q": "Hangi değişken ismi Python'da geçersizdir?", "opts": ["_gizli", "sayi_1", "for_loop", "toplam"], "ans": 2, "exp": "\"for\" Python'ın anahtar kelimesidir. \"for_loop\" geçerlidir ama \"for\" tek başına kullanılamaz."}, {"q": "a: int = 42 ne anlama gelir?", "opts": ["a yalnızca int alabilir", "Type hint — çalışmada kontrol edilmez", "Syntax error", "Otomatik int çeviri"], "ans": 1, "exp": "Type hint IDE/araçlar için bilgi verir; Python runtime kontrol etmez"}], "fills": [{"code": "isim = <input class=\"blank\" data-ans=\"&quot;Ahmet&quot;\" placeholder=\"?\" style=\"width:80px\">\nprint(isim)", "hint": "String için çift veya tek tırnak"}, {"code": "x, <input class=\"blank\" data-ans=\"y\" placeholder=\"?\" style=\"width:30px\"> = <span class=\"nm\">10</span>, <span class=\"nm\">20</span>\nprint(x, y)", "hint": "İkinci değişken adı"}, {"code": "puan = <span class=\"nm\">50</span>\npuan <input class=\"blank\" data-ans=\"+=\" placeholder=\"?\" style=\"width:35px\"> <span class=\"nm\">10</span>  <span class=\"cm\"># 60 olur</span>", "hint": "Artırma kısaltması"}, {"code": "<span class=\"cm\"># Değişkeni sil</span>\nx = <span class=\"nm\">5</span>\n<input class=\"blank\" data-ans=\"del\" placeholder=\"?\" style=\"width:35px\"> x", "hint": "Silme komutu"}, {"code": "x, y = <span class=\"nm\">10</span>, <span class=\"nm\">20</span>\nx, y = <input class=\"blank\" data-ans=\"y\" placeholder=\"?\" style=\"width:30px\">, x  <span class=\"cm\"># takas</span>", "hint": "Sağdaki ilk değişken"}], "drag": [{"code": "x=42; y=x; x=100  →  y = <span class=\"hl\">___</span>", "ans": "42", "opts": ["42", "100", "0", "None", "x"], "exp": "y hâlâ 42 nesnesine bakıyor; x değişince y etkilenmez"}, {"code": "a,b = 10,20  →  a,b = b,<span class=\"hl\">___</span>", "ans": "a", "opts": ["a", "b", "0", "None", "10"], "exp": "Takas: sağ taraf (b,a) önce hesaplanır, sonra atılır"}, {"code": "puan = 50; puan <span class=\"hl\">___</span> 10  →  60", "ans": "+=", "opts": ["+=", "-=", "*=", "/=", "=="], "exp": "+= kısaltması: puan = puan + 10"}, {"code": "type(42)  →  class \"<span class=\"hl\">___</span>\"", "ans": "int", "opts": ["int", "str", "float", "bool", "num"], "exp": "42 tam sayı (integer) türündedir"}, {"code": "del x  →  print(x)  →  <span class=\"hl\">___</span>", "ans": "NameError", "opts": ["NameError", "None", "0", "False", "\"\""], "exp": "del sonrası değişken yok edilir; erişim NameError verir"}], "code": {"task": "id() fonksiyonu ile Python'ın etiket modelini keşfet: a ve b'yi aynı değere ata, id'lerini karşılaştır. Sonra birini değiştir ve farkı gözlemle. Tip ipucu (type hint) ile de bir değişken yaz.", "starter": "# Python'ın etiket modeli\na = 42\nb = a\n\nprint(f\"a = {a}, b = {b}\")\nprint(f\"Aynı nesne mi? {id(a) == id(b)}\")\n\na = 100  # a başka nesneye baktı\nprint(f\"a = {a}, b = {b}\")\nprint(f\"Şimdi aynı mı? {id(a) == id(b)}\")\n\n# Type hint örneği\nisim: str = \"Python\"\nyas: int = 32\nprint(f\"{isim} {yas} yaşında\")\n", "hint": "Type hint: isim: str = \"Ahmet\". id() ile iki değişkenin aynı nesneye işaret edip etmediğini görebilirsin.", "checkFn": "(code)=>{\n      const hasId=code.includes('id(');\n      const hasHint=code.includes(': str') || code.includes(': int') || code.includes(': float');\n      const hasPrint=(code.match(/print/g)||[]).length>=3;\n      const hasAssign=code.includes('=');\n      let p=(hasId?3:0)+(hasHint?3:0)+(hasPrint?2:0)+(hasAssign?2:0);\n      return {pts:p,max:10,ok:p>=5,msg:p>=8?'Python bellek uzmanı! 🧠':p>=5?'Etiket modeli anlaşıldı!':'id() ve type hint kullan.'};\n    }"}}, {"id": "datatypes", "icon": "🔢", "locked": true, "title": "Veri Tipleri", "desc": "int/float/str/bool — iç yapı, tuzaklar ve Python'a özgü davranışlar.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>int — Sonsuz Büyüklükte Tam Sayı</h3></div>\n    <p>Python'un <code>int</code> tipi diğer dillere göre özel: <strong>sonsuz büyüklükte</strong> olabilir. Java'da int 32 bit, Python'da sınır yok. Hafıza izin verdiği sürece büyüyebilir:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">int_sinirsiz.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"fn\">print</span>(<span class=\"nm\">2</span> ** <span class=\"nm\">100</span>)   <span class=\"cm\"># 1267650600228229401496703205376</span><br>\n<span class=\"fn\">print</span>(<span class=\"nm\">10</span> ** <span class=\"nm\">50</span>)   <span class=\"cm\"># 1 ardından 50 sıfır — Java'da imkansız!</span><br><br>\n<span class=\"cm\"># Python'un int = arbitrary precision integer</span></div><textarea class=\"cb-src\" style=\"display:none\">print(2 ** 100)\nprint(10 ** 50)\nprint(2 ** 64)  # Java long'u tasar</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--red)\"></div><h3>float — Neden 0.1 + 0.2 = 0.3 Değil?</h3></div>\n    <p>Bu Python hatası değil — tüm programlama dillerinde olan bir <strong>temel bilgisayar matematiği gerçeği</strong>dir:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">float_hassasiyet.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"fn\">print</span>(<span class=\"nm\">0.1</span> + <span class=\"nm\">0.2</span>)          <span class=\"cm\"># 0.30000000000000004 !!!</span><br>\n<span class=\"fn\">print</span>(<span class=\"nm\">0.1</span> + <span class=\"nm\">0.2</span> == <span class=\"nm\">0.3</span>)    <span class=\"cm\"># False !!!</span><br><br>\n<span class=\"cm\"># Neden? Float = IEEE 754 binary — 0.1 ikili sistemde tam değil</span><br>\n<span class=\"cm\"># Çözüm 1: round()</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">round</span>(<span class=\"nm\">0.1</span> + <span class=\"nm\">0.2</span>, <span class=\"nm\">2</span>))  <span class=\"cm\"># 0.3</span><br>\n<span class=\"cm\"># Çözüm 2: Para için Decimal kullan</span><br>\n<span class=\"kw\">from</span> decimal <span class=\"kw\">import</span> Decimal<br>\n<span class=\"fn\">print</span>(Decimal(<span class=\"st\">\"0.1\"</span>) + Decimal(<span class=\"st\">\"0.2\"</span>))  <span class=\"cm\"># 0.3 tam!</span></div><textarea class=\"cb-src\" style=\"display:none\">print(0.1 + 0.2)\nprint(0.1 + 0.2 == 0.3)\nprint(round(0.1 + 0.2, 2))\nfrom decimal import Decimal\nprint(Decimal(\"0.1\") + Decimal(\"0.2\"))</textarea></div>\n    <div class=\"box warn\"><span class=\"box-icon\">⚠️</span><span><strong>Para hesabında float KULLANMA!</strong> <code>0.1 + 0.2 = 0.30000000000000004</code>. Bankacılık uygulamalarında <code>decimal.Decimal</code> veya kuruş cinsinden <code>int</code> kullan. Float para hesabı buglarla dolu olur.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>str — Her Şey Unicode</h3></div>\n    <p>Python 3'te tüm string'ler <strong>Unicode</strong>. Türkçe, Arapça, Emoji — hepsi desteklenir. Python 2'de ASCII standardı vardı ve bu büyük sorunlara yol açıyordu:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">str_unicode.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Türkçe, emoji, Arapça — hepsi geçerli</span><br>\ns1 = <span class=\"st\">\"Merhaba 🐍\"</span><br>\ns2 = <span class=\"st\">\"مرحبا\"</span><br>\ns3 = <span class=\"st\">\"日本語\"</span><br>\n<span class=\"fn\">print</span>(s1, s2, s3)<br><br>\n<span class=\"cm\"># Her karakter Unicode code point'idir</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">ord</span>(<span class=\"st\">\"A\"</span>))    <span class=\"cm\"># 65</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">chr</span>(<span class=\"nm\">65</span>))    <span class=\"cm\"># A</span></div><textarea class=\"cb-src\" style=\"display:none\">s1 = \"Merhaba 🐍\"\ns2 = \"Unicode harika\"\ns3 = \"Japonca: 日本語\"\nprint(s1)\nprint(s2)\nprint(s3)\nprint(ord(\"A\"))\nprint(chr(65))\nprint(chr(9829))  # kalp sembolü</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>bool — int'in Özel Hali</h3></div>\n    <p><code>bool</code>, Python'da <code>int</code>'in alt sınıfıdır. <code>True == 1</code> ve <code>False == 0</code>. Bu tasarım bilinçli: boolean aritmetik mümkün olsun diye:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">bool_aritmetik.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"fn\">print</span>(<span class=\"kw\">True</span> + <span class=\"kw\">True</span>)    <span class=\"cm\"># 2</span><br>\n<span class=\"fn\">print</span>(<span class=\"kw\">True</span> * <span class=\"nm\">5</span>)       <span class=\"cm\"># 5</span><br>\n<span class=\"fn\">print</span>(<span class=\"kw\">False</span> + <span class=\"nm\">10</span>)    <span class=\"cm\"># 10</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">isinstance</span>(<span class=\"kw\">True</span>, <span class=\"fn\">int</span>))  <span class=\"cm\"># True — bool int'in alt sınıfı</span><br><br>\n<span class=\"cm\"># Pratik kullanım: doğruları say</span><br>\nsonuclar = [<span class=\"kw\">True</span>, <span class=\"kw\">False</span>, <span class=\"kw\">True</span>, <span class=\"kw\">True</span>, <span class=\"kw\">False</span>]<br>\n<span class=\"fn\">print</span>(<span class=\"fn\">sum</span>(sonuclar))   <span class=\"cm\"># 3 (doğru sayısı)</span></div><textarea class=\"cb-src\" style=\"display:none\">print(True + True)\nprint(True * 5)\nprint(False + 10)\nprint(isinstance(True, int))\nsonuclar = [True, False, True, True, False]\nprint(sum(sonuclar))</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Truthy / Falsy — Hangi Değerler False?</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">truthy_falsy.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Python'da False sayılan değerler:</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>(<span class=\"nm\">0</span>))         <span class=\"cm\"># False — sıfır</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>(<span class=\"nm\">0.0</span>))       <span class=\"cm\"># False — sıfır float</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>(<span class=\"st\">\"\"</span>))        <span class=\"cm\"># False — boş string</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>([]))        <span class=\"cm\"># False — boş liste</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>(<span class=\"kw\">None</span>))     <span class=\"cm\"># False — None</span><br><br>\n<span class=\"cm\"># Geri kalan her şey True'dur:</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>(<span class=\"nm\">1</span>))         <span class=\"cm\"># True</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>(<span class=\"st\">\"a\"</span>))      <span class=\"cm\"># True</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>([<span class=\"nm\">0</span>]))      <span class=\"cm\"># True — boş değil!</span></div><textarea class=\"cb-src\" style=\"display:none\">print(bool(0))\nprint(bool(0.0))\nprint(bool(\"\"))\nprint(bool([]))\nprint(bool(None))\nprint(\"---\")\nprint(bool(1))\nprint(bool(\"a\"))\nprint(bool([0]))</textarea></div>\n    <div class=\"box deep\"><span class=\"box-icon\">🧠</span><span><strong>Neden bu tasarım?</strong> <code>if liste:</code> yazmak <code>if len(liste) > 0:</code> yazmaktan kısadır. Python tasarımcıları \"temiz ve kısa kod\" felsefesiyle Truthy/Falsy konseptini benimsedi. C'den miras bir fikirdir ama Python bunu genişletti.</span></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "Python'da int tipinin maksimum değeri nedir?", "opts": ["2^32 - 1", "2^64 - 1", "Sınırsız", "sys.maxsize"], "ans": 2, "exp": "Python int \"arbitrary precision\" (sınırsız hassasiyet) destekler. Bellek yettiği sürece büyüyebilir."}, {"q": "0.1 + 0.2 == 0.3 neden False döner?", "opts": ["Python hatası", "IEEE 754 binary float hassasiyet sınırı", "Tip uyumsuzluğu", "Python 3'te bug"], "ans": 1, "exp": "Float sayılar ikili sistemde tam temsil edilemez. Bu tüm programlama dillerinde olan matematiksel bir gerçektir."}, {"q": "bool True'nun tam sayı karşılığı nedir?", "opts": ["0", "-1", "1", "2"], "ans": 2, "exp": "True == 1, False == 0. bool, int'in alt sınıfıdır ve bu tasarım bilinçlidir."}, {"q": "bool([0]) nedir?", "opts": ["False", "True", "Hata", "None"], "ans": 1, "exp": "[0] boş değil, içinde 0 olan bir liste. Boş OLMAYAN liste True'dur. bool([]) False olurdu."}, {"q": "Para hesabında float yerine ne kullanmalısın?", "opts": ["double", "Decimal", "int her zaman", "complex"], "ans": 1, "exp": "decimal.Decimal tam hassasiyet; float yuvarlama hatası verir"}], "fills": [{"code": "<span class=\"fn\">print</span>(<span class=\"nm\">0.1</span> + <span class=\"nm\">0.2</span>)   <span class=\"cm\"># Tam 0.3 için:</span>\n<span class=\"fn\">print</span>(<input class=\"blank\" data-ans=\"round\" placeholder=\"?\" style=\"width:55px\">(<span class=\"nm\">0.1</span> + <span class=\"nm\">0.2</span>, <span class=\"nm\">2</span>))", "hint": "Yuvarlama fonksiyonu"}, {"code": "<span class=\"fn\">print</span>(<span class=\"fn\">bool</span>(<input class=\"blank\" data-ans='\"\"' placeholder=\"?\" style=\"width:30px\">))  <span class=\"cm\"># False</span>", "hint": "Boş string — iki tırnak yan yana"}, {"code": "<span class=\"fn\">print</span>(<span class=\"kw\">True</span> + <input class=\"blank\" data-ans=\"True\" placeholder=\"?\" style=\"width:45px\">)  <span class=\"cm\"># 2</span>", "hint": "Boolean aritmetik"}, {"code": "<span class=\"fn\">print</span>(<span class=\"fn\">isinstance</span>(<span class=\"kw\">True</span>, <input class=\"blank\" data-ans=\"int\" placeholder=\"?\" style=\"width:40px\">))  <span class=\"cm\"># True</span>", "hint": "bool hangi tipin alt sınıfı?"}, {"code": "<span class=\"kw\">from</span> decimal <span class=\"kw\">import</span> <input class=\"blank\" data-ans=\"Decimal\" placeholder=\"?\" style=\"width:70px\">", "hint": "Para hesabı için import"}], "drag": [{"code": "0.1 + 0.2 == 0.3  →  <span class=\"hl\">___</span>", "ans": "False", "opts": ["False", "True", "None", "Error", "0.3"], "exp": "IEEE 754 float hassasiyet sorunu; tüm dillerde böyle"}, {"code": "bool([])  →  <span class=\"hl\">___</span>", "ans": "False", "opts": ["False", "True", "None", "[]", "Error"], "exp": "Boş liste Falsy — boş her şey Python'da False"}, {"code": "bool([0])  →  <span class=\"hl\">___</span>", "ans": "True", "opts": ["True", "False", "None", "[0]", "Error"], "exp": "[0] boş değil; içinde sıfır olan liste True'dur"}, {"code": "True + True  →  <span class=\"hl\">___</span>", "ans": "2", "opts": ["2", "True", "1", "Error", "\"TrueTrue\""], "exp": "bool int alt sınıfı: True=1, dolayısıyla 1+1=2"}, {"code": "isinstance(True, <span class=\"hl\">___</span>)  →  True", "ans": "int", "opts": ["int", "bool", "str", "float", "object"], "exp": "bool, int'in alt sınıfıdır (subclass)"}], "code": {"task": "Float hassasiyet sorununu keşfet ve çöz: 0.1+0.2 ve 0.1+0.7+0.2'yi hem float hem Decimal ile hesapla. Sonuçları karşılaştır. bool aritmetiğini de dene: bir True/False listesi oluştur, doğruları say.", "starter": "# Float hassasiyet sorunu\nprint(\"Float:\", 0.1 + 0.2)\nprint(\"Float == 0.3?\", 0.1 + 0.2 == 0.3)\n\nfrom decimal import Decimal\nprint(\"Decimal:\", Decimal(\"0.1\") + Decimal(\"0.2\"))\n\n# Bool aritmetiği\nsonuclar = [True, False, True, True, False, True]\ndogru_sayi = sum(sonuclar)\nprint(f\"Toplam: {len(sonuclar)}, Doğru: {dogru_sayi}\")\n", "hint": "from decimal import Decimal. sum([True, False, True]) doğru sayısını verir.", "checkFn": "(code)=>{\n      const hasDecimal=code.includes('Decimal');\n      const hasBool=code.includes('True') && code.includes('False');\n      const hasSum=code.includes('sum(');\n      const hasPrint=(code.match(/print/g)||[]).length>=3;\n      let p=(hasDecimal?3:0)+(hasBool?2:0)+(hasSum?3:0)+(hasPrint?2:0);\n      return {pts:p,max:10,ok:p>=6,msg:p>=8?'Float ustası! 🎯':p>=6?'Güzel keşif!':'Decimal ve sum() kullan.'};\n    }"}}, {"id": "conditions", "icon": "🔀", "locked": true, "title": "Koşullar (if/elif/else)", "desc": "Karar mekanizması, kısa devre mantığı ve Pythonic koşullar.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>Neden if? — Hesaplama vs Karar Verme</h3></div>\n    <p>İlk bilgisayarlar sadece hesaplama yapıyordu. Turing'in keşfi: hesaplama sırasında <em>karar verme</em> mümkün olursa, hesaplanabilir her problemi çözebilirsin. <code>if</code> ifadesi bu karar verme mekanizmasıdır.</p>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Girinti neden zorunlu?</strong> Çoğu dil <code>{ }</code> kullanır. Python Guido van Rossum'un felsefesi: \"zaten girintili yazıyorsun, neden tekrar parantez yazasın?\" Bazıları bunu sever (temiz görünüm), bazıları sevmez (bir karakter hatası syntax error). Python'ın kimliğidir.</span></div>\n\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">if_temel.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">yas = <span class=\"nm\">17</span><br><br>\n<span class=\"kw\">if</span> yas >= <span class=\"nm\">18</span>:         <span class=\"cm\"># koşul True ise girintili blok çalışır</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"Yetişkin\"</span>)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"Oy kullanabilirsin\"</span>)<br>\n<span class=\"kw\">else</span>:                  <span class=\"cm\"># koşul False ise bu blok çalışır</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"Genç\"</span>)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"Henüz değil\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Bu her zaman çalışır\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">yas = 17\nif yas >= 18:\n    print(\"Yetiskin\")\n    print(\"Oy kullanabilirsin\")\nelse:\n    print(\"Genc\")\n    print(\"Henüz degil\")\nprint(\"Bu her zaman calisir\")</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--red)\"></div><h3>Karşılaştırma Operatörleri — == vs is Farkı</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">esitlik.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># == değerleri karşılaştırır</span><br>\na = [<span class=\"nm\">1</span>, <span class=\"nm\">2</span>, <span class=\"nm\">3</span>]<br>\nb = [<span class=\"nm\">1</span>, <span class=\"nm\">2</span>, <span class=\"nm\">3</span>]<br>\n<span class=\"fn\">print</span>(a == b)   <span class=\"cm\"># True  — değerler aynı</span><br>\n<span class=\"fn\">print</span>(a <span class=\"kw\">is</span> b)   <span class=\"cm\"># False — farklı nesneler</span><br><br>\n<span class=\"cm\"># is nesne kimliğini karşılaştırır (id'leri)</span><br>\nc = a<br>\n<span class=\"fn\">print</span>(a <span class=\"kw\">is</span> c)   <span class=\"cm\"># True  — aynı nesne</span><br><br>\n<span class=\"cm\"># KURAL: None ile karşılaştırırken is kullan!</span><br>\nx = <span class=\"kw\">None</span><br>\n<span class=\"kw\">if</span> x <span class=\"kw\">is</span> <span class=\"kw\">None</span>:   <span class=\"cm\"># doğru</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"x boş\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">a = [1, 2, 3]\nb = [1, 2, 3]\nprint(a == b)\nprint(a is b)\nc = a\nprint(a is c)\nx = None\nif x is None:\n    print(\"x bos\")</textarea></div>\n    <div class=\"box warn\"><span class=\"box-icon\">⚠️</span><span><code>if x == None:</code> yerine <code>if x is None:</code> yaz. Neden? Bazı sınıflar <code>==</code> operatörünü özelleştirebilir. <code>is None</code> kesinlikle aynı None nesnesini kontrol eder.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Kısa Devre Mantığı — and / or</h3></div>\n    <p>Python <code>and</code> ve <code>or</code> ifadelerini <strong>soldan sağa</strong> değerlendirir ve erken durur. Buna <em>short-circuit evaluation</em> (kısa devre) denir:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">kisa_devre.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># and: ilk False'ta durur</span><br>\n<span class=\"fn\">print</span>(<span class=\"kw\">False</span> <span class=\"kw\">and</span> <span class=\"nm\">1</span>/<span class=\"nm\">0</span>)   <span class=\"cm\"># False (ZeroDivision olmaz!)</span><br><br>\n<span class=\"cm\"># or: ilk True'da durur</span><br>\n<span class=\"fn\">print</span>(<span class=\"kw\">True</span> <span class=\"kw\">or</span> <span class=\"nm\">1</span>/<span class=\"nm\">0</span>)    <span class=\"cm\"># True (ZeroDivision olmaz!)</span><br><br>\n<span class=\"cm\"># Pratik: None kontrolü + özellik erişimi</span><br>\nmetin = <span class=\"st\">\"Python\"</span><br>\n<span class=\"kw\">if</span> metin <span class=\"kw\">and</span> metin[<span class=\"nm\">0</span>] == <span class=\"st\">\"P\"</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"P ile başlıyor\"</span>)  <span class=\"cm\"># metin boş olsa metin[0] hata vermezdi</span></div><textarea class=\"cb-src\" style=\"display:none\">print(False and \"bu calismir\")\nprint(True or \"bu calismir\")\nmetin = \"Python\"\nif metin and metin[0] == \"P\":\n    print(\"P ile basliyor\")\nmetin2 = \"\"\nif metin2 and metin2[0] == \"P\":\n    print(\"Bu calisir\")\nelse:\n    print(\"Bos string, kisa devre!\")</textarea></div>\n    <div class=\"box deep\"><span class=\"box-icon\">🧠</span><span><strong>or ile varsayılan değer:</strong> <code>isim = kullanici_girisi or \"Misafir\"</code> — kullanici_girisi boş string veya None ise \"Misafir\" kullanır. Bu Python'da çok yaygın bir kalıptır. Neden? <code>or</code> ilk Truthy değeri döndürür.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>elif Zinciri — Neden elif? Neden else-if değil?</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">elif_zincir.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">puan = <span class=\"nm\">73</span><br><br>\n<span class=\"kw\">if</span> puan >= <span class=\"nm\">90</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"A — Pekiyi\"</span>)<br>\n<span class=\"kw\">elif</span> puan >= <span class=\"nm\">75</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"B — İyi\"</span>)<br>\n<span class=\"kw\">elif</span> puan >= <span class=\"nm\">60</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"C — Orta\"</span>)    <span class=\"cm\"># ← bu çalışır</span><br>\n<span class=\"kw\">elif</span> puan >= <span class=\"nm\">50</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"D — Geçer\"</span>)<br>\n<span class=\"kw\">else</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"F — Kaldı\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">puan = 73\nif puan >= 90:\n    print(\"A - Pekiyi\")\nelif puan >= 75:\n    print(\"B - Iyi\")\nelif puan >= 60:\n    print(\"C - Orta\")\nelif puan >= 50:\n    print(\"D - Gecer\")\nelse:\n    print(\"F - Kaldi\")</textarea></div>\n    <div class=\"box alt\"><span class=\"box-icon\">⚖️</span><span>Python 3.10+ ile <strong>match/case</strong> geldi (switch-case benzeri). Basit elif zincirleri için elif yeterlidir. Karmaşık pattern matching için match/case okunabilirliği artırır: <code>match renk: case \"kırmızı\": ...</code></span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Ternary — Tek Satır Koşul</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">ternary.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Uzun yol:</span><br>\n<span class=\"kw\">if</span> sayi > <span class=\"nm\">0</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;sonuc = <span class=\"st\">\"pozitif\"</span><br>\n<span class=\"kw\">else</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;sonuc = <span class=\"st\">\"negatif\"</span><br><br>\n<span class=\"cm\"># Kısa yol (ternary expression):</span><br>\nsayi = <span class=\"nm\">-5</span><br>\nsonuc = <span class=\"st\">\"pozitif\"</span> <span class=\"kw\">if</span> sayi > <span class=\"nm\">0</span> <span class=\"kw\">else</span> <span class=\"st\">\"negatif\"</span><br>\n<span class=\"fn\">print</span>(sonuc)  <span class=\"cm\"># negatif</span></div><textarea class=\"cb-src\" style=\"display:none\">sayi = -5\nsonuc = \"pozitif\" if sayi > 0 else \"negatif\"\nprint(sonuc)\n# Iç içe ternary (okunabilirlik bozulur!)\nyas = 20\nkategori = \"cocuk\" if yas < 12 else \"genc\" if yas < 18 else \"yetiskin\"\nprint(kategori)</textarea></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "a == b ve a is b arasındaki fark nedir?", "opts": ["Fark yok", "== değer, is nesne kimliği karşılaştırır", "== hızlı, is yavaş", "is sadece sayılar için"], "ans": 1, "exp": "a = [1,2]; b = [1,2] için a == b True ama a is b False. Çünkü değerler aynı ama farklı nesneler."}, {"q": "False and (1/0) ifadesi ne döndürür?", "opts": ["Sıfıra bölme hatası", "False", "True", "None"], "ans": 1, "exp": "Kısa devre: and ifadesinde ilk operand False ise Python sağ tarafı hiç değerlendirmez. 1/0 çalışmaz."}, {"q": "None kontrolü için doğru yol hangisi?", "opts": ["x == None", "x = None", "x is None", "x != None"], "ans": 2, "exp": "\"x is None\" kullan. == operatörü override edilebilir. is None Python standartlarında tercih edilen yoldur."}, {"q": "\"A\" if 5 > 3 else \"B\" ne döndürür?", "opts": ["\"B\"", "\"A\"", "True", "Hata"], "ans": 1, "exp": "5 > 3 True, ternary soldaki değeri döndürür: \"A\"."}, {"q": "isim = giris or \"Misafir\" — giris=\"\" ise ne döner?", "opts": ["Boş string", "\"Misafir\"", "None", "False"], "ans": 1, "exp": "\"\" Falsy; or ilk Truthy değeri döndürür: \"Misafir\""}], "fills": [{"code": "x = <span class=\"nm\">15</span>\n<input class=\"blank\" data-ans=\"if\" placeholder=\"?\" style=\"width:28px\"> x > <span class=\"nm\">10</span>:\n    print(<span class=\"st\">\"Büyük\"</span>)", "hint": "Koşul keyword'ü"}, {"code": "x = <span class=\"nm\">7</span>\n<span class=\"kw\">if</span> x % <span class=\"nm\">2</span> <input class=\"blank\" data-ans=\"==\" placeholder=\"?\" style=\"width:30px\"> <span class=\"nm\">0</span>:\n    print(<span class=\"st\">\"Çift\"</span>)", "hint": "Eşitlik kontrolü — iki eşittir"}, {"code": "y = <span class=\"kw\">None</span>\n<span class=\"kw\">if</span> y <input class=\"blank\" data-ans=\"is\" placeholder=\"?\" style=\"width:28px\"> <span class=\"kw\">None</span>:\n    print(<span class=\"st\">\"Boş\"</span>)", "hint": "Kimlik karşılaştırma operatörü"}, {"code": "s = <span class=\"st\">\"büyük\"</span> <span class=\"kw\">if</span> <span class=\"nm\">10</span> > <span class=\"nm\">5</span> <input class=\"blank\" data-ans=\"else\" placeholder=\"?\" style=\"width:45px\"> <span class=\"st\">\"küçük\"</span>", "hint": "Ternary'nin ikinci kısmı"}, {"code": "x = <span class=\"nm\">7</span>\nsonuc = <span class=\"st\">\"tek\"</span> <span class=\"kw\">if</span> x % <span class=\"nm\">2</span> <input class=\"blank\" data-ans=\"!=\" placeholder=\"?\" style=\"width:35px\"> <span class=\"nm\">0</span> <span class=\"kw\">else</span> <span class=\"st\">\"çift\"</span>", "hint": "Eşit değil operatörü"}], "drag": [{"code": "\"büyük\" if 5>3 <span class=\"hl\">___</span> \"küçük\"", "ans": "else", "opts": ["else", "elif", "and", "or", "not"], "exp": "Ternary: değer if koşul else diğer_değer"}, {"code": "x is <span class=\"hl\">___</span>  # None kontrolü", "ans": "None", "opts": ["None", "null", "0", "\"\"", "False"], "exp": "None ile karşılaştırmada is kullan, == değil"}, {"code": "False <span class=\"hl\">___</span> (1/0)  →  False  (hata yok!)", "ans": "and", "opts": ["and", "or", "not", "is", "in"], "exp": "and kısa devre: ilk False'ta durur, sağı değerlendirmez"}, {"code": "if x>90:...<span class=\"hl\">___</span> x>75:...else:", "ans": "elif", "opts": ["elif", "else", "if", "while", "and"], "exp": "elif = else if zinciri; birden fazla koşul sınar"}, {"code": "a=[1,2]; b=[1,2]; a <span class=\"hl\">___</span> b  →  True", "ans": "==", "opts": ["==", "is", "!=", ">=", "<="], "exp": "== değerleri karşılaştırır; is nesne kimliğini karşılaştırır"}], "code": {"task": "Vücut kitle indeksi (BMI) hesaplayıcı yaz. BMI = ağırlık / boy². Kategoriler: <18.5 Zayıf, 18.5-25 Normal, 25-30 Kilolu, >30 Obez. Kısa devre mantığı ile geçersiz veriyi de kontrol et (boy>0 ve agirlik>0).", "starter": "agirlik = 70  # kg\nboy = 1.75    # metre\n\n# Geçerlilik kontrolü\nif agirlik > 0 and boy > 0:\n    bmi = agirlik / (boy ** 2)\n    print(f\"BMI: {bmi:.2f}\")\n    \n    if bmi < 18.5:\n        kategori = \"Zayıf\"\n    elif bmi < 25:\n        kategori = \"Normal\"\n    elif bmi < 30:\n        kategori = \"Kilolu\"\n    else:\n        kategori = \"Obez\"\n    \n    print(f\"Kategori: {kategori}\")\nelse:\n    print(\"Geçersiz değer!\")\n", "hint": "bmi = agirlik / boy**2. Kısa devre: if agirlik > 0 and boy > 0 — sol False olursa sağ çalışmaz.", "checkFn": "(code)=>{\n      const hasElif=(code.match(/elif/g)||[]).length>=2;\n      const hasBMI=code.includes('bmi') || code.includes('BMI');\n      const hasAnd=code.includes('and');\n      const hasElse=code.includes('else');\n      let p=(hasElif?3:0)+(hasBMI?3:0)+(hasAnd?2:0)+(hasElse?2:0);\n      return {pts:p,max:10,ok:p>=6,msg:p>=8?'Hekim gibi! 🩺':p>=6?'Doğru mantık!':'elif zinciri ve and operatörü kullan.'};\n    }"}}, {"id": "forloop", "icon": "🔁", "locked": true, "title": "for Döngüsü", "desc": "Iteratörler, range'in iç yapısı ve Pythonic döngü kalıpları.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>for Döngüsü Nasıl Gerçekten Çalışır?</h3></div>\n    <p>Python'daki <code>for</code> döngüsü aslında bir <em>iterator protokolü</em> üzerine kuruludur. Her <code>for x in y</code> ifadesinde Python, <code>y</code> nesnesini bir <em>iterator</em>'a dönüştürür ve her adımda <code>next()</code> çağırır:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">iterator_protokol.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># for döngüsünün içinde aslında bu olur:</span><br>\nmetin = <span class=\"st\">\"ABC\"</span><br>\nit = <span class=\"fn\">iter</span>(metin)    <span class=\"cm\"># iterator oluştur</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">next</span>(it))    <span class=\"cm\"># A</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">next</span>(it))    <span class=\"cm\"># B</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">next</span>(it))    <span class=\"cm\"># C</span><br>\n<span class=\"cm\"># bir daha: StopIteration hatası → döngü biter</span><br><br>\n<span class=\"cm\"># for döngüsü bunu otomatik yapar:</span><br>\n<span class=\"kw\">for</span> harf <span class=\"kw\">in</span> <span class=\"st\">\"ABC\"</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(harf, end=<span class=\"st\">\" \"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">metin = \"ABC\"\nit = iter(metin)\nprint(next(it))\nprint(next(it))\nprint(next(it))\nprint(\"---for ile:\")\nfor harf in \"ABC\":\n    print(harf, end=\" \")</textarea></div>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Neden bu tasarım?</strong> Iterator protokolü sayesinde for döngüsü string, liste, dosya, generator, kendi yazdığın sınıf — her şey üzerinde çalışır. Tek koşul: <code>__iter__</code> ve <code>__next__</code> metodlarının var olması.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>range() — Lazy (Tembel) Sayı Üretici</h3></div>\n    <p><code>range()</code> bütün sayıları belleğe almaz. Sadece başlangıç, bitiş, adım saklar ve her seferinde bir sonraki sayıyı üretir. <code>range(1000000)</code> sadece birkaç bayt bellek kullanır:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">range_detay.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># range(stop): 0'dan stop-1'e</span><br>\n<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">5</span>):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(i, end=<span class=\"st\">\" \"</span>)   <span class=\"cm\"># 0 1 2 3 4</span><br>\n<span class=\"fn\">print</span>()<br><br>\n<span class=\"cm\"># range(start, stop): start'tan stop-1'e</span><br>\n<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">1</span>, <span class=\"nm\">6</span>):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(i, end=<span class=\"st\">\" \"</span>)   <span class=\"cm\"># 1 2 3 4 5</span><br>\n<span class=\"fn\">print</span>()<br><br>\n<span class=\"cm\"># range(start, stop, adım): adım adım</span><br>\n<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">0</span>, <span class=\"nm\">20</span>, <span class=\"nm\">5</span>):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(i, end=<span class=\"st\">\" \"</span>)   <span class=\"cm\"># 0 5 10 15</span><br>\n<span class=\"fn\">print</span>()<br><br>\n<span class=\"cm\"># Geri sayım: negatif adım</span><br>\n<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">5</span>, <span class=\"nm\">0</span>, -<span class=\"nm\">1</span>):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(i, end=<span class=\"st\">\" \"</span>)   <span class=\"cm\"># 5 4 3 2 1</span></div><textarea class=\"cb-src\" style=\"display:none\">for i in range(5):\n    print(i, end=\" \")\nprint()\nfor i in range(1, 6):\n    print(i, end=\" \")\nprint()\nfor i in range(0, 20, 5):\n    print(i, end=\" \")\nprint()\nfor i in range(5, 0, -1):\n    print(i, end=\" \")</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>enumerate() — İndeks + Değer Birlikte</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">enumerate_ornek.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">renkler = [<span class=\"st\">\"kırmızı\"</span>, <span class=\"st\">\"mavi\"</span>, <span class=\"st\">\"yeşil\"</span>]<br><br>\n<span class=\"cm\"># Kötü yol — manuel sayaç:</span><br>\ni = <span class=\"nm\">0</span><br>\n<span class=\"kw\">for</span> renk <span class=\"kw\">in</span> renkler:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(i, renk)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;i += <span class=\"nm\">1</span><br><br>\n<span class=\"cm\"># Pythonic yol — enumerate:</span><br>\n<span class=\"kw\">for</span> i, renk <span class=\"kw\">in</span> <span class=\"fn\">enumerate</span>(renkler):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">f\"{i}: {renk}\"</span>)<br><br>\n<span class=\"cm\"># 1'den başlamak istiyorsan:</span><br>\n<span class=\"kw\">for</span> i, renk <span class=\"kw\">in</span> <span class=\"fn\">enumerate</span>(renkler, start=<span class=\"nm\">1</span>):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">f\"{i}. {renk}\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">renkler = [\"kirmizi\", \"mavi\", \"yesil\"]\nfor i, renk in enumerate(renkler):\n    print(f\"{i}: {renk}\")\nprint(\"---\")\nfor i, renk in enumerate(renkler, start=1):\n    print(f\"{i}. {renk}\")</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>break, continue ve for/else</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">break_continue_else.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># break: ilk 5'i bul ve dur</span><br>\nsayilar = [<span class=\"nm\">2</span>, <span class=\"nm\">7</span>, <span class=\"nm\">5</span>, <span class=\"nm\">3</span>, <span class=\"nm\">8</span>]<br>\n<span class=\"kw\">for</span> s <span class=\"kw\">in</span> sayilar:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">if</span> s == <span class=\"nm\">5</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"5 bulundu!\"</span>)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">break</span><br>\n<span class=\"kw\">else</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"5 bulunamadı\"</span>)   <span class=\"cm\"># break ile çıkılmadıysa çalışır</span></div><textarea class=\"cb-src\" style=\"display:none\">sayilar = [2, 7, 5, 3, 8]\nfor s in sayilar:\n    if s == 5:\n        print(\"5 bulundu!\")\n        break\nelse:\n    print(\"5 bulunamadi\")\n\nsayilar2 = [2, 7, 9, 3, 8]\nfor s in sayilar2:\n    if s == 5:\n        print(\"5 bulundu!\")\n        break\nelse:\n    print(\"5 bulunamadi\")</textarea></div>\n    <div class=\"box deep\"><span class=\"box-icon\">🧠</span><span><strong>for/else nedir?</strong> Python'a özgü, diğer dillerde yok. <code>else</code> bloğu döngü <em>normal</em> biterse çalışır. <code>break</code> ile çıkıldıysa çalışmaz. \"Bir şey bulamadım\" mantığı için çok kullanışlı.</span></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "range(3, 8) hangi sayıları üretir?", "opts": ["3,4,5,6,7,8", "3,4,5,6,7", "4,5,6,7,8", "2,3,4,5,6,7"], "ans": 1, "exp": "range(start, stop): start'tan başlar, stop dahil değil. 3,4,5,6,7."}, {"q": "for döngüsü Python'da hangi protokolü kullanır?", "opts": ["loop protokolü", "__next__ ve __iter__ iterator protokolü", "range protokolü", "index protokolü"], "ans": 1, "exp": "Python for döngüsü iter() ile iterator oluşturur, her adımda next() çağırır. StopIteration gelince biter."}, {"q": "for/else bloğundaki else ne zaman çalışır?", "opts": ["Her zaman", "Döngü break ile bitmediğinde", "Döngü break ile bittiğinde", "Hiçbir zaman"], "ans": 1, "exp": "else bloğu break olmadan normal tamamlanırsa çalışır. break ile çıkıldıysa else atlanır."}, {"q": "range(1000000) kaç bayt bellek kullanır?", "opts": ["~4 MB", "~8 MB", "Birkaç bayt (lazy)", "Değere göre değişir"], "ans": 2, "exp": "range() lazy'dir. Tüm sayıları saklamaz, sadece başlangıç-bitiş-adımı saklar. İsteyince üretir."}, {"q": "for döngüsü Python'da hangi protokolü kullanır?", "opts": ["index protokolü", "__iter__ / __next__ iterator protokolü", "range protokolü", "loop protokolü"], "ans": 1, "exp": "Python iter() ile iterator oluşturur, her adımda next() çağırır"}], "fills": [{"code": "<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <input class=\"blank\" data-ans=\"range\" placeholder=\"?\" style=\"width:55px\">(<span class=\"nm\">5</span>):\n    print(i)", "hint": "Sayı aralığı üreten fonksiyon"}, {"code": "renkler = [<span class=\"st\">\"kırmızı\"</span>, <span class=\"st\">\"mavi\"</span>]\n<span class=\"kw\">for</span> i, r <span class=\"kw\">in</span> <input class=\"blank\" data-ans=\"enumerate\" placeholder=\"?\" style=\"width:80px\">(renkler):\n    print(i, r)", "hint": "İndeks + değer birlikte veren fonksiyon"}, {"code": "<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">10</span>, <span class=\"nm\">0</span>, <input class=\"blank\" data-ans=\"-1\" placeholder=\"?\" style=\"width:30px\">):\n    print(i)  <span class=\"cm\"># geri sayım</span>", "hint": "Negatif adım"}, {"code": "<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">5</span>, <span class=\"nm\">0</span>, <input class=\"blank\" data-ans=\"-1\" placeholder=\"?\" style=\"width:30px\">):", "hint": "Negatif adım — geri sayım"}, {"code": "<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">5</span>, <span class=\"nm\">0</span>, <input class=\"blank\" data-ans=\"
