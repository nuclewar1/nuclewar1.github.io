-1\" placeholder=\"?\" style=\"width:30px\">):", "hint": "Negatif adım — geri sayım"}], "drag": [{"code": "for i in <span class=\"hl\">___</span>(5):  # 0,1,2,3,4", "ans": "range", "opts": ["range", "list", "len", "iter", "map"], "exp": "range() belirtilen sayıya kadar üretir (son dahil değil)"}, {"code": "for i, x in <span class=\"hl\">___</span>(liste):", "ans": "enumerate", "opts": ["enumerate", "range", "zip", "sorted", "iter"], "exp": "enumerate() indeks + değer çiftleri verir"}, {"code": "range(0, 10, <span class=\"hl\">___</span>)  →  0,2,4,6,8", "ans": "2", "opts": ["2", "1", "-1", "0", "5"], "exp": "3. parametre adım sayısıdır; her 2'de bir atla"}, {"code": "Bulunan elemanda döngüyü bitir: <span class=\"hl\">___</span>", "ans": "break", "opts": ["break", "continue", "pass", "return", "stop"], "exp": "break döngüyü tamamen sonlandırır"}, {"code": "for/else: else bloğu <span class=\"hl\">___</span> çalışır", "ans": "break yoksa", "opts": ["break yoksa", "her zaman", "break ile", "hata olunca", "hiçbir zaman"], "exp": "else: break olmadan normal tamamlanırsa çalışır"}], "code": {"task": "for/else ile \"asal sayı\" bulucu yaz: 2-50 arasındaki asal sayıları listele. Asal = sadece 1 ve kendisine bölünebilen. Bonus: toplam asal sayı sayısını da ver.", "starter": "print(\"2-50 arası asal sayılar:\")\nasal_sayisi = 0\n\nfor sayi in range(2, 51):\n    for bolen in range(2, sayi):\n        if sayi % bolen == 0:\n            break  # bölündü, asal değil\n    else:\n        # break olmadan bitti = asal!\n        print(sayi, end=\" \")\n        asal_sayisi += 1\n\nprint(f\"\\nToplam: {asal_sayisi} asal sayı\")\n", "hint": "İç döngüde bölünen bulunursa break. else bloğu break olmadan bitince çalışır — bu sayı asaldır.", "checkFn": "(code)=>{\n      const hasForElse=code.includes('else:') && code.includes('break');\n      const hasRange=code.includes('range(');\n      const hasPrint=code.includes('print');\n      const hasCount=code.includes('sayi') || code.includes('count') || code.includes('toplam');\n      let p=(hasForElse?4:0)+(hasRange?2:0)+(hasPrint?2:0)+(hasCount?2:0);\n      return {pts:p,max:10,ok:p>=6,msg:p>=8?'Matematikçi! 🔢':p>=6?'for/else anlaşıldı!':'for/else ve break kalıbını kullan.'};\n    }"}}, {"id": "whileloop", "icon": "⏳", "locked": true, "title": "while Döngüsü", "desc": "Belirsiz tekrar, sentinel kalıpları ve sonsuz döngü yönetimi.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>for vs while — Hangisini Ne Zaman?</h3></div>\n    <p>Bu iki döngü birbirinin yerine geçebilir ama doğru seçim kodun okunabilirliğini etkiler:</p>\n    <table class=\"cmp-table\">\n      <tr><th>Kullan</th><th>Ne Zaman</th><th>Örnek</th></tr>\n      <tr><td class=\"ok\">for</td><td>Kaç kez döneceğini biliyorsun</td><td>Listenin her elemanı, 1'den 100'e</td></tr>\n      <tr><td class=\"ok\">while</td><td>Bir koşul sağlanana kadar</td><td>Kullanıcı doğru giriş yapana kadar</td></tr>\n      <tr><td class=\"bad\">while sayac &lt; n</td><td>for kullanılabilirken while — kötü alışkanlık</td><td>for i in range(n) kullan</td></tr>\n    </table>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Temel while ve Sonsuz Döngü Tehlikesi</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">while_temel.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">sayac = <span class=\"nm\">0</span><br>\n<span class=\"kw\">while</span> sayac < <span class=\"nm\">5</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(sayac)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;sayac += <span class=\"nm\">1</span>   <span class=\"cm\"># ZORUNLU! unutursan sonsuza döner</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Bitti\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">sayac = 0\nwhile sayac < 5:\n    print(sayac)\n    sayac += 1\nprint(\"Bitti\")</textarea></div>\n    <div class=\"box warn\"><span class=\"box-icon\">⚠️</span><span><strong>Sonsuz döngü tuzağı:</strong> <code>while True:</code> yazdıktan sonra döngüyü değiştirecek bir şey yoksa program sonsuza çalışır. Her while döngüsünde kendin sor: \"Bu koşul nasıl False olacak?\"</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>while True + break — En Yaygın Kalıp</h3></div>\n    <p>Döngünün içinde ne zaman duracağını bildiğinde <code>while True</code> + <code>break</code> kullanırsın. \"Do-While\" benzeri bir davranış verir:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">while_break_kalip.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Doğru giriş alana kadar sor (simülasyon)</span><br>\ndeneme = <span class=\"nm\">0</span><br>\ngirişler = [<span class=\"st\">\"abc\"</span>, <span class=\"st\">\"-5\"</span>, <span class=\"st\">\"25\"</span>]  <span class=\"cm\"># simüle edilmiş girişler</span><br><br>\n<span class=\"kw\">while</span> <span class=\"kw\">True</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;giris = girişler[deneme]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;deneme += <span class=\"nm\">1</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">try</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sayi = <span class=\"fn\">int</span>(giris)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">if</span> sayi > <span class=\"nm\">0</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">f\"Geçerli: {sayi}\"</span>)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">break</span>   <span class=\"cm\"># döngüden çık</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">else</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">f\"'{sayi}' negatif, tekrar dene\"</span>)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">except</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">f\"'{giris}' sayı değil, tekrar dene\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">deneme = 0\ngirisler = [\"abc\", \"-5\", \"25\"]\nwhile True:\n    giris = girisler[deneme]\n    deneme += 1\n    try:\n        sayi = int(giris)\n        if sayi > 0:\n            print(f\"Gecerli: {sayi}\")\n            break\n        else:\n            print(f\"'{sayi}' negatif, tekrar dene\")\n    except:\n        print(f\"'{giris}' sayi degil, tekrar dene\")</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Sentinel Değer Kalıbı</h3></div>\n    <p><em>Sentinel</em> (bekçi) değer, döngüyü durduran özel bir değerdir. Örneğin kullanıcı \"q\" yazana kadar çalış:</p>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">sentinel.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># Simüle edilmiş girişler (normalde input() ile)</span><br>\ngirişler = [<span class=\"st\">\"elma\"</span>, <span class=\"st\">\"armut\"</span>, <span class=\"st\">\"q\"</span>, <span class=\"st\">\"muz\"</span>]<br>\nidx = <span class=\"nm\">0</span><br>\ntoplam_ürün = <span class=\"nm\">0</span><br><br>\n<span class=\"kw\">while</span> <span class=\"kw\">True</span>:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;giris = girişler[idx]; idx += <span class=\"nm\">1</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">if</span> giris == <span class=\"st\">\"q\"</span>:   <span class=\"cm\"># sentinel değer</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">break</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;toplam_ürün += <span class=\"nm\">1</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">f\"Eklendi: {giris}\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Toplam: {toplam_ürün} ürün\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">girisler = [\"elma\", \"armut\", \"q\", \"muz\"]\nidx = 0\ntoplam_urun = 0\nwhile True:\n    giris = girisler[idx]; idx += 1\n    if giris == \"q\":\n        break\n    toplam_urun += 1\n    print(f\"Eklendi: {giris}\")\nprint(f\"Toplam: {toplam_urun} urun\")</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--green)\"></div><h3>Faiz Hesaplayıcı — while'ın Doğal Kullanımı</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">faiz.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">miktar = <span class=\"nm\">1000.0</span><br>\nhedef = <span class=\"nm\">2000.0</span><br>\nfaiz = <span class=\"nm\">0.10</span>   <span class=\"cm\"># %10</span><br>\nyil = <span class=\"nm\">0</span><br><br>\n<span class=\"kw\">while</span> miktar < hedef:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;miktar *= (<span class=\"nm\">1</span> + faiz)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;yil += <span class=\"nm\">1</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{yil} yılda para ikiye katlandı!\"</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Son miktar: {miktar:.2f} TL\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">miktar = 1000.0\nhedef = 2000.0\nfaiz = 0.10\nyil = 0\nwhile miktar < hedef:\n    miktar *= (1 + faiz)\n    yil += 1\nprint(f\"{yil} yilda para ikiye katlandi!\")\nprint(f\"Son miktar: {miktar:.2f} TL\")</textarea></div>\n    <div class=\"box tip\"><span class=\"box-icon\">💡</span><span><strong>Neden burada while?</strong> Kaç yıl gerektiğini <em>önceden bilmiyoruz</em>. while koşul sağlanana kadar çalışır. Eğer \"10 yıl döngüsü\" deseydik for kullanırdık.</span></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "while döngüsünü hangi durumda kullanmalısın?", "opts": ["Her zaman for yerine", "Kaç kez döneceğini bilmediğinde", "Sadece sayılarla", "Listeler için"], "ans": 1, "exp": "Kaç iterasyon olacağı belirsizse while. Sayı biliniyorsa for tercih edilmeli."}, {"q": "while True döngüsü nasıl durur?", "opts": ["Kendi kendine", "break ifadesiyle", "Python otomatik durdurur", "return ile"], "ans": 1, "exp": "while True sonsuz döngüdür. Sadece break, return veya exception ile durabilir."}, {"q": "Sentinel değeri nedir?", "opts": ["Döngü sayacı", "Döngüyü durduran özel bir değer", "Başlangıç değeri", "Koşul ifadesi"], "ans": 1, "exp": "Sentinel, döngünün bitmesi gerektiğini bildiren özel bir değerdir. \"q\", -1, None gibi."}, {"q": "while sayac < n yerine ne kullanmalısın?", "opts": ["while True", "for i in range(n)", "while n > 0", "İkisi de aynı"], "ans": 1, "exp": "Sayı biliniyorsa for i in range(n) daha Pythonic ve okunabilirdir."}, {"q": "Python do-while nasıl simüle edilir?", "opts": ["do:...while koşul", "while True:...if not koşul: break", "repeat...until", "for _ in range(1):"], "ans": 1, "exp": "Python do-while sözdizimi yoktur; while True + break ile ilk çalışma garantilenir"}], "fills": [{"code": "sayac = <span class=\"nm\">0</span>\n<input class=\"blank\" data-ans=\"while\" placeholder=\"?\" style=\"width:50px\"> sayac < <span class=\"nm\">5</span>:\n    print(sayac)\n    sayac += <span class=\"nm\">1</span>", "hint": "Döngü keyword'ü"}, {"code": "<span class=\"kw\">while</span> <span class=\"kw\">True</span>:\n    x = <span class=\"nm\">5</span>\n    <span class=\"kw\">if</span> x > <span class=\"nm\">3</span>:\n        <input class=\"blank\" data-ans=\"break\" placeholder=\"?\" style=\"width:55px\">", "hint": "Döngüyü kıran komut"}, {"code": "miktar = <span class=\"nm\">100</span>\n<span class=\"kw\">while</span> miktar < <span class=\"nm\">1000</span>:\n    miktar <input class=\"blank\" data-ans=\"*=\" placeholder=\"?\" style=\"width:35px\"> <span class=\"nm\">2</span>", "hint": "Çarpmalı artırma kısaltması"}, {"code": "x = <span class=\"nm\">1</span>\n<span class=\"kw\">while</span> x < <span class=\"nm\">100</span>:\n    x <input class=\"blank\" data-ans=\"*=\" placeholder=\"?\" style=\"width:35px\"> <span class=\"nm\">2</span>", "hint": "İkiye katlama kısaltması"}, {"code": "x = <span class=\"nm\">1</span>\n<span class=\"kw\">while</span> x < <span class=\"nm\">100</span>:\n    x <input class=\"blank\" data-ans=\"*=\" placeholder=\"?\" style=\"width:35px\"> <span class=\"nm\">2</span>", "hint": "İkiye katlama kısaltması"}], "drag": [{"code": "<span class=\"hl\">___</span> sayac &lt; 5:  sayac += 1", "ans": "while", "opts": ["while", "for", "if", "do", "until"], "exp": "while koşul True olduğu sürece döngü çalışır"}, {"code": "while True:  if x == \"q\": <span class=\"hl\">___</span>", "ans": "break", "opts": ["break", "continue", "stop", "return", "exit"], "exp": "break while True döngüsünü sonlandıran tek yol"}, {"code": "miktar = 1000; while miktar&lt;2000: miktar <span class=\"hl\">___</span> 1.1", "ans": "*=", "opts": ["*=", "+=", "-=", "/=", "**="], "exp": "*= çarparak büyütür: miktar = miktar * 1.1"}, {"code": "Kaç iterasyon olduğu bilinmiyorsa: <span class=\"hl\">___</span>", "ans": "while", "opts": ["while", "for", "range", "if", "elif"], "exp": "for sayı belli; while koşul belli — bilinmiyorsa while"}, {"code": "continue ne yapar?  →  <span class=\"hl\">___</span>", "ans": "sonraki adıma geç", "opts": ["sonraki adıma geç", "döngüyü bitir", "geri döner", "hata verir", "program durur"], "exp": "continue o adımı atlar; döngü bir sonraki iterasyona geçer"}], "code": {"task": "Collatz Conjecture (3n+1 problemi): bir sayıdan başla. Çift ise 2'ye böl, tek ise 3 ile çarp ve 1 ekle. 1'e ulaşana kadar devam et. Kaç adımda 1'e ulaştığını göster.", "starter": "# Collatz Problemi\nbaslangic = 27\nsayi = baslangic\nadim = 0\n\nprint(f\"Başlangıç: {sayi}\")\n\nwhile sayi != 1:\n    if sayi % 2 == 0:\n        sayi = sayi // 2\n    else:\n        sayi = sayi * 3 + 1\n    adim += 1\n    \nprint(f\"1'e ulaşıldı! {adim} adımda.\")\n", "hint": "Çift: sayi //= 2. Tek: sayi = sayi * 3 + 1. while sayi != 1 ile devam et.", "checkFn": "(code)=>{\n      const hasWhile=code.includes('while');\n      const hasEven=code.includes('% 2') || code.includes('%2');\n      const hasDiv=code.includes('// 2') || code.includes('//2');\n      const hasMul=code.includes('* 3') || code.includes('*3');\n      let p=(hasWhile?3:0)+(hasEven?2:0)+(hasDiv?2:0)+(hasMul?3:0);\n      return {pts:p,max:10,ok:p>=6,msg:p>=8?'Matematikçi! ∞':p>=6?'Collatz çözüldü!':'while, %, // ve *3+1 kullan.'};\n    }"}}, {"id": "functions", "icon": "⚙️", "locked": true, "title": "Fonksiyonlar", "desc": "Stack frame, kapsam, DRY prensibi ve tehlikeli varsayılan argüman tuzağı.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>Fonksiyon Neden Var? — DRY Prensibi</h3></div>\n    <p>DRY: <em>Don't Repeat Yourself</em>. Aynı kodu iki yerde yazarsan bir hata bulduğunda iki yerde düzeltmek zorunda kalırsın. Üç yerde yazarsan üç yerde. Fonksiyon bu sorunu çözer — kodu bir kez tanımla, istediğin kadar kullan.</p>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Fonksiyonların ikinci amacı:</strong> Abstraction (soyutlama). <code>kare_al(5)</code> yazdığında \"2'nin üssü\" detayını bilmek zorunda değilsin. Detaylar içeride gizlidir. Bu, büyük programları yönetilebilir parçalara böler.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Tanımlama, Çağırma, Dönüş</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">fonk_temel.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># def: tanımla | parametreler: virgülle | return: değer döndür</span><br>\n<span class=\"kw\">def</span> <span class=\"fn\">daire_alani</span>(yaricap):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"st\">\"\"\"Dairenin alanını hesaplar. Parametre: yaricap (float/int)\"\"\"</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;pi = <span class=\"nm\">3.14159</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">return</span> pi * yaricap ** <span class=\"nm\">2</span><br><br>\n<span class=\"cm\"># Çağırma — parantez ZORUNLU</span><br>\nalan = <span class=\"fn\">daire_alani</span>(<span class=\"nm\">5</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Alan: {alan:.2f}\"</span>)   <span class=\"cm\"># 78.54</span><br><br>\n<span class=\"cm\"># Sonuç başka hesapta kullanılabilir</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">daire_alani</span>(<span class=\"nm\">3</span>) + <span class=\"fn\">daire_alani</span>(<span class=\"nm\">4</span>))</div><textarea class=\"cb-src\" style=\"display:none\">def daire_alani(yaricap):\n    pi = 3.14159\n    return pi * yaricap ** 2\nalan = daire_alani(5)\nprint(f\"Alan: {alan:.2f}\")\nprint(daire_alani(3) + daire_alani(4))</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--red)\"></div><h3>Kapsam (Scope) — Yerel vs Global</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">scope.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">x = <span class=\"nm\">10</span>   <span class=\"cm\"># global</span><br><br>\n<span class=\"kw\">def</span> <span class=\"fn\">fonk</span>():<br>\n&nbsp;&nbsp;&nbsp;&nbsp;x = <span class=\"nm\">99</span>  <span class=\"cm\"># yerel — global x'e dokunmaz</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"fn\">print</span>(<span class=\"st\">\"İçeride:\"</span>, x)<br><br>\n<span class=\"fn\">fonk</span>()<br>\n<span class=\"fn\">print</span>(<span class=\"st\">\"Dışarıda:\"</span>, x)   <span class=\"cm\"># hâlâ 10</span></div><textarea class=\"cb-src\" style=\"display:none\">x = 10\ndef fonk():\n    x = 99\n    print(\"Iceride:\", x)\nfonk()\nprint(\"Disarida:\", x)</textarea></div>\n    <div class=\"box warn\"><span class=\"box-icon\">⚠️</span><span><strong>global kullanmaktan kaçın!</strong> <code>global x</code> ile global değişkeni değiştirebilirsin ama bu kötü pratiktir. Fonksiyonlar return ile değer döndürmeli, dışarıdaki değişkenleri değiştirmemeli. Yan etkisiz (pure) fonksiyonlar tercih et.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--red)\"></div><h3>⚡ EN TEHLİKELİ TUZAK: Mutable Varsayılan Argüman</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">mutable_default.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\">### YANLIŞ — BUG'LI KOD ###</span><br>\n<span class=\"kw\">def</span> <span class=\"fn\">listeye_ekle</span>(eleman, liste=[]):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;liste.append(eleman)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">return</span> liste<br><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">listeye_ekle</span>(<span class=\"nm\">1</span>))   <span class=\"cm\"># [1]  — görünüşe bakılırsa doğru</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">listeye_ekle</span>(<span class=\"nm\">2</span>))   <span class=\"cm\"># [1, 2] ← BEKLENMEYEN!</span><br>\n<span class=\"fn\">print</span>(<span class=\"fn\">listeye_ekle</span>(<span class=\"nm\">3</span>))   <span class=\"cm\"># [1, 2, 3] ← Neden???</span></div><textarea class=\"cb-src\" style=\"display:none\">def listeye_ekle_yanlis(eleman, liste=[]):\n    liste.append(eleman)\n    return liste\nprint(listeye_ekle_yanlis(1))\nprint(listeye_ekle_yanlis(2))\nprint(listeye_ekle_yanlis(3))\n\n# DOGRU yol:\ndef listeye_ekle_dogru(eleman, liste=None):\n    if liste is None:\n        liste = []\n    liste.append(eleman)\n    return liste\nprint(listeye_ekle_dogru(1))\nprint(listeye_ekle_dogru(2))</textarea></div>\n    <div class=\"box deep\"><span class=\"box-icon\">🧠</span><span><strong>Neden oluyor?</strong> Varsayılan argüman <code>[]</code>, fonksiyon <em>tanımlandığında</em> bir kez oluşturulur. Her çağrıda yeni liste değil, aynı listeye ekleniyor. Çözüm: varsayılan değer olarak <code>None</code> kullan, içeride kontrol et.</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>Birden Fazla Değer Döndürme ve *args</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">coklu_return.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"kw\">def</span> <span class=\"fn\">istatistik</span>(*sayilar):  <span class=\"cm\"># *args: istediğin kadar argüman</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">if</span> <span class=\"kw\">not</span> sayilar: <span class=\"kw\">return</span> <span class=\"kw\">None</span>, <span class=\"kw\">None</span>, <span class=\"kw\">None</span><br>\n&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"kw\">return</span> <span class=\"fn\">min</span>(sayilar), <span class=\"fn\">max</span>(sayilar), <span class=\"fn\">sum</span>(sayilar)/<span class=\"fn\">len</span>(sayilar)<br><br>\nkucuk, buyuk, ort = <span class=\"fn\">istatistik</span>(<span class=\"nm\">3</span>, <span class=\"nm\">7</span>, <span class=\"nm\">1</span>, <span class=\"nm\">9</span>, <span class=\"nm\">5</span>)<br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Min:{kucuk} Max:{buyuk} Ort:{ort:.1f}\"</span>)</div><textarea class=\"cb-src\" style=\"display:none\">def istatistik(*sayilar):\n    if not sayilar:\n        return None, None, None\n    return min(sayilar), max(sayilar), sum(sayilar)/len(sayilar)\nkucuk, buyuk, ort = istatistik(3, 7, 1, 9, 5)\nprint(f\"Min:{kucuk} Max:{buyuk} Ort:{ort:.1f}\")</textarea></div>\n    <div class=\"box alt\"><span class=\"box-icon\">⚖️</span><span><strong>Fonksiyonun alternatifleri:</strong> Lambda (anonim fonksiyon): <code>kare = lambda x: x**2</code>. Kısa, tek ifade için. Method: bir sınıfa bağlı fonksiyon. Closure: iç fonksiyon dışın değişkenlerini hatırlar. Bunlar ileri konular ama var olduklarını bil.</span></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "DRY prensibi ne anlama gelir?", "opts": ["Debug, Run, Yield", "Don't Repeat Yourself", "Dynamic, Recursive, Yield", "Hiçbiri"], "ans": 1, "exp": "Don't Repeat Yourself — aynı kodu tekrar yazma, fonksiyona çek. Bir değişiklik bir yerde yeterli olsun."}, {"q": "def f(liste=[]) — bu kodun tehlikesi nedir?", "opts": ["Syntax error", "[] her çağrıda yeniden oluşturulmaz, paylaşılır", "liste parametresi kullanılamaz", "return olmadığı için"], "ans": 1, "exp": "Mutable varsayılan argüman: liste fonksiyon tanımlandığında bir kez oluşturulur, her çağrıda paylaşılır. Çözüm: None kullan."}, {"q": "return olmayan fonksiyon ne döndürür?", "opts": ["0", "Boş string", "None", "Hata"], "ans": 2, "exp": "Python'da her fonksiyon bir değer döndürür. Açık return yoksa None döner."}, {"q": "Fonksiyon içinde tanımlanan değişken nerededir?", "opts": ["Global kapsam", "Yerel kapsam", "Her iki kapsamda", "Dışarıdan erişilebilir"], "ans": 1, "exp": "Fonksiyon içinde tanımlanan değişkenler yereldir. Fonksiyon bitince silinir, dışarıdan erişilemez."}, {"q": "Closure nedir?", "opts": ["Hata yakalama bloğu", "İç fonksiyonun dış değişkeni hatırlaması", "Sınıf metodu", "Decorator"], "ans": 1, "exp": "Closure: iç fonksiyon dış fonksiyon bitse bile dıştaki değişkeni hatırlar"}], "fills": [{"code": "<input class=\"blank\" data-ans=\"def\" placeholder=\"?\" style=\"width:35px\"> kare(x):\n    return x ** <span class=\"nm\">2</span>", "hint": "Fonksiyon tanımlama keyword'ü"}, {"code": "def topla(a, b):\n    <input class=\"blank\" data-ans=\"return\" placeholder=\"?\" style=\"width:60px\"> a + b", "hint": "Değer döndürme komutu"}, {"code": "def selamla(isim, mesaj=<input class=\"blank\" data-ans=\"&quot;Merhaba&quot;\" placeholder=\"?\" style=\"width:80px\">):\n    print(mesaj, isim)", "hint": "String varsayılan değer — tırnaklı yaz"}, {"code": "<span class=\"cm\"># Mutable varsayılan tuzaktan kaç:</span>\n<span class=\"kw\">def</span> ekle(x, liste=<input class=\"blank\" data-ans=\"None\" placeholder=\"?\" style=\"width:50px\">):\n    if liste is None: liste = []", "hint": "Mutable'ın yerine güvenli değer"}, {"code": "<span class=\"kw\">def</span> <span class=\"fn\">merhaba</span>(isim=<input class=\"blank\" data-ans=\"'Misafir'\" placeholder=\"?\" style=\"width:70px\">):\n    print(isim)", "hint": "String varsayılan — tırnaklı"}], "drag": [{"code": "<span class=\"hl\">___</span> topla(a, b):  return a+b", "ans": "def", "opts": ["def", "fun", "function", "class", "return"], "exp": "def = define; fonksiyon tanımlama anahtar kelimesi"}, {"code": "return'suz fonksiyon  →  <span class=\"hl\">___</span>", "ans": "None", "opts": ["None", "0", "\"\"", "False", "Error"], "exp": "Açık return olmadığında Python otomatik None döndürür"}, {"code": "Mutable default tuzağı: def f(l=<span class=\"hl\">___</span>)", "ans": "None", "opts": ["None", "[]", "{}", "()", "0"], "exp": "Mutable varsayılan yerine None; içeride kontrol et"}, {"code": "def f(*args): → args tipi  <span class=\"hl\">___</span>", "ans": "tuple", "opts": ["tuple", "list", "dict", "set", "str"], "exp": "*args ile gelen argümanlar tuple olarak saklanır"}, {"code": "DRY = <span class=\"hl\">___</span> Yourself", "ans": "Don't Repeat", "opts": ["Don't Repeat", "Do Repeat", "Don't Run", "Do Return", "Don't Rename"], "exp": "DRY: aynı kodu tekrar yazma; fonksiyona çek"}], "code": {"task": "Sıcaklık dönüştürücü fonksiyonlar yaz: C→F, F→C, C→K (Kelvin). *args ile birden fazla değer kabul et, hepsini çevir. Docstring ekle.", "starter": "def celsius_to_fahrenheit(c):\n    \"\"\"Celsius'u Fahrenheit'e çevirir. F = C * 9/5 + 32\"\"\"\n    return c * 9/5 + 32\n\ndef fahrenheit_to_celsius(f):\n    \"\"\"Fahrenheit'i Celsius'e çevirir.\"\"\"\n    return (f - 32) * 5/9\n\ndef celsius_to_kelvin(c):\n    \"\"\"Celsius'u Kelvin'e çevirir. K = C + 273.15\"\"\"\n    return c + 273.15\n\n# Test\nprint(celsius_to_fahrenheit(0))    # 32.0\nprint(celsius_to_fahrenheit(100))  # 212.0\nprint(fahrenheit_to_celsius(98.6)) # 37.0\nprint(celsius_to_kelvin(0))        # 273.15\n", "hint": "C→K: return c + 273.15. F→C: return (f - 32) * 5/9. Docstring = fonksiyonun içine \"\"\" ile.", "checkFn": "(code)=>{\n      const hasDoc=code.includes('\"\"\"') || code.includes(\"'''\");\n      const hasDef=(code.match(/def /g)||[]).length>=2;\n      const hasReturn=(code.match(/return/g)||[]).length>=2;\n      const hasFormula=code.includes('9/5') || code.includes('5/9') || code.includes('273');\n      let p=(hasDef?2:0)+(hasReturn?2:0)+(hasFormula?4:0)+(hasDoc?2:0);\n      return {pts:p,max:10,ok:p>=6,msg:p>=8?'Termodinamik uzmanı! 🌡️':p>=6?'Formüller doğru!':'3 fonksiyon, return ve docstring.'};\n    }"}}]}, {"id": "m2", "label": "Karakter Dizileri", "icon": "📝", "color": "#3dd68c", "lessons": [{"id": "strings", "icon": "🔤", "locked": true, "title": "String Temelleri", "desc": "Immutability, Unicode modeli, dilimleme ve f-string'in gücü.", "lesson": "<div class=\"lesson-text\">\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--purple)\"></div><h3>String Neden Değiştirilemez (Immutable)?</h3></div>\n    <p>Python'da string'ler oluşturulduktan sonra değiştirilemez. <code>s[0] = \"p\"</code> hata verir. Neden?</p>\n    <div class=\"box why\"><span class=\"box-icon\">🤔</span><span><strong>Immutability'nin avantajları:</strong><br>1) Güvenli paylaşım: aynı string farklı değişkenlerde olabilir, biri değişince diğeri etkilenmez.<br>2) Hash'lenebilir: dict anahtarı veya set elemanı olabilir (liste olamaz).<br>3) Bellek optimizasyonu: Python aynı string'i bellekte bir kez saklar (string interning).</span></div>\n\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">immutable.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">s = <span class=\"st\">\"Python\"</span><br>\n<span class=\"cm\"># s[0] = \"p\"  → TypeError: str does not support item assignment</span><br><br>\n<span class=\"cm\"># Değiştirmek istiyorsan yeni string oluşturursun:</span><br>\nyeni = <span class=\"st\">\"p\"</span> + s[<span class=\"nm\">1</span>:]   <span class=\"cm\"># \"python\"</span><br>\n<span class=\"fn\">print</span>(s)     <span class=\"cm\"># Python — değişmedi!</span><br>\n<span class=\"fn\">print</span>(yeni)  <span class=\"cm\"># python</span><br><br>\n<span class=\"cm\"># String interning: aynı içerik, aynı nesne</span><br>\na = <span class=\"st\">\"hello\"</span><br>\nb = <span class=\"st\">\"hello\"</span><br>\n<span class=\"fn\">print</span>(a <span class=\"kw\">is</span> b)   <span class=\"cm\"># True (CPython'da genellikle)</span></div><textarea class=\"cb-src\" style=\"display:none\">s = \"Python\"\n# s[0] = \"p\"  # hata verir\nyeni = \"p\" + s[1:]\nprint(s)\nprint(yeni)\na = \"hello\"\nb = \"hello\"\nprint(a is b)</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--blue)\"></div><h3>İndeksleme ve Dilimleme — Tam Harita</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">indeks_dilim.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">s = <span class=\"st\">\"Python\"</span><br>\n<span class=\"cm\">#     P  y  t  h  o  n</span><br>\n<span class=\"cm\">#     0  1  2  3  4  5</span><br>\n<span class=\"cm\">#    -6 -5 -4 -3 -2 -1</span><br><br>\n<span class=\"fn\">print</span>(s[<span class=\"nm\">0</span>])    <span class=\"cm\"># P</span><br>\n<span class=\"fn\">print</span>(s[-<span class=\"nm\">1</span>])   <span class=\"cm\"># n (son karakter)</span><br>\n<span class=\"fn\">print</span>(s[<span class=\"nm\">1</span>:<span class=\"nm\">4</span>])  <span class=\"cm\"># yth (1,2,3 — 4 dahil değil)</span><br>\n<span class=\"fn\">print</span>(s[:<span class=\"nm\">3</span>])   <span class=\"cm\"># Pyt (baştan 3)</span><br>\n<span class=\"fn\">print</span>(s[<span class=\"nm\">3</span>:])   <span class=\"cm\"># hon (3'ten sona)</span><br>\n<span class=\"fn\">print</span>(s[::-<span class=\"nm\">1</span>]) <span class=\"cm\"># nohtyP (ters)</span><br>\n<span class=\"fn\">print</span>(s[:<span class=\"nm\">:</span><span class=\"nm\">2</span>])  <span class=\"cm\"># Pto (her 2. karakter)</span></div><textarea class=\"cb-src\" style=\"display:none\">s = \"Python\"\nprint(s[0])\nprint(s[-1])\nprint(s[1:4])\nprint(s[:3])\nprint(s[3:])\nprint(s[::-1])\nprint(s[::2])</textarea></div>\n    <div class=\"box tip\"><span class=\"box-icon\">💡</span><span><strong>Dilim formülü:</strong> <code>s[başlangıç:bitiş:adım]</code>. Hepsi isteğe bağlı. Negatif adım geri gider. <code>s[::-1]</code> stringi tersine çevirir — çok yaygın bir kalıp!</span></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--amber)\"></div><h3>f-string — Modern String Formatlama</h3></div>\n    <p>Python 3.6'da gelen f-string bugüne kadar en temiz string formatlama yöntemidir:</p>\n    <table class=\"cmp-table\">\n      <tr><th>Yöntem</th><th>Örnek</th><th>Öneri</th></tr>\n      <tr><td>f-string (py 3.6+)</td><td><code>f\"Ad: {isim}\"</code></td><td class=\"ok\">✅ Kullan</td></tr>\n      <tr><td>format()</td><td><code>\"Ad: {}\".format(isim)</code></td><td class=\"mid\">⚠ Eski, hâlâ geçerli</td></tr>\n      <tr><td>% operatörü</td><td><code>\"Ad: %s\" % isim</code></td><td class=\"bad\">❌ Eski, kullanma</td></tr>\n      <tr><td>+ ile birleştir</td><td><code>\"Ad: \" + isim</code></td><td class=\"bad\">❌ Döngüde çok yavaş</td></tr>\n    </table>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">fstring_guc.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\">isim = <span class=\"st\">\"Zeynep\"</span>; yas = <span class=\"nm\">24</span>; puan = <span class=\"nm\">98.765</span><br><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"İsim: {isim}\"</span>)              <span class=\"cm\"># basit değişken</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Yaş: {yas + 10}\"</span>)           <span class=\"cm\"># ifade yazılabilir</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"Puan: {puan:.2f}\"</span>)          <span class=\"cm\"># 2 ondalık</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{'Orta':^20}\"</span>)             <span class=\"cm\"># ortalanmış, 20 geniş</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{'Sol':<15}|{'Sağ':>15}\"</span>)   <span class=\"cm\"># hizalama</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{1234567:,}\"</span>)               <span class=\"cm\"># 1,234,567 (binlik)</span><br>\n<span class=\"fn\">print</span>(<span class=\"st\">f\"{0.75:.1%}\"</span>)               <span class=\"cm\"># 75.0%</span></div><textarea class=\"cb-src\" style=\"display:none\">isim = \"Zeynep\"; yas = 24; puan = 98.765\nprint(f\"Isim: {isim}\")\nprint(f\"Yas: {yas + 10}\")\nprint(f\"Puan: {puan:.2f}\")\nprint(f\"{'Orta':^20}\")\nprint(f\"{'Sol':<15}|{'Sag':>15}\")\nprint(f\"{1234567:,}\")\nprint(f\"{0.75:.1%}\")</textarea></div>\n\n    <div class=\"section-h\"><div class=\"bar\" style=\"background:var(--red)\"></div><h3>Döngüde String Birleştirme — Büyük Tuzak</h3></div>\n    <div class=\"code-block runnable\"><div class=\"cb-header\"><div class=\"cb-dots\"></div><span class=\"cb-label\">string_performans.py</span><span class=\"cb-run-tag\">▶</span></div><div class=\"cb-body\"><span class=\"cm\"># YANLIŞ — her += yeni string oluşturur (O(n²) bellek!)</span><br>\nsonuc = <span class=\"st\">\"\"</span><br>\n<span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">5</span>):<br>\n&nbsp;&nbsp;&nbsp;&nbsp;sonuc += <span class=\"fn\">str</span>(i)   <span class=\"cm\"># her adımda yeni string!</span><br>\n<span class=\"fn\">print</span>(sonuc)   <span class=\"cm\"># 01234</span><br><br>\n<span class=\"cm\"># DOĞRU — join() kullan (O(n))</span><br>\nparcalar = [<span class=\"fn\">str</span>(i) <span class=\"kw\">for</span> i <span class=\"kw\">in</span> <span class=\"fn\">range</span>(<span class=\"nm\">5</span>)]<br>\nsonuc = <span class=\"st\">\"\"</span>.join(parcalar)<br>\n<span class=\"fn\">print</span>(sonuc)   <span class=\"cm\"># 01234</span></div><textarea class=\"cb-src\" style=\"display:none\">sonuc = \"\"\nfor i in range(5):\n    sonuc += str(i)\nprint(\"+=:\", sonuc)\nparcalar = [str(i) for i in range(5)]\nsonuc2 = \"\".join(parcalar)\nprint(\"join:\", sonuc2)</textarea></div>\n    <div class=\"box alt\"><span class=\"box-icon\">⚖️</span><span><strong>Neden join() daha hızlı?</strong> String immutable olduğu için <code>+=</code> her seferinde yeni string oluşturur: \"0\", \"01\", \"012\", \"0123\"... Bellek ve zaman O(n²). <code>join()</code> önce toplam boyutu hesaplar, bir kere bellek ayırır, kopyalar. O(n).</span></div>\n\n    <div class=\"lesson-nav\"><button class=\"nav-btn go\" onclick=\"switchPhase(1)\">🧠 Teste Geç →</button></div>\n  </div>", "quiz": [{"q": "Python'da string neden immutable?", "opts": ["Yavaş olduğu için", "Güvenli paylaşım, hashlenebilirlik ve bellek optimizasyonu", "Basit tasarım için", "Zorunlu değil, seçilebilir"], "ans": 1, "exp": "Immutable string'ler güvenle paylaşılabilir, dict anahtarı olabilir ve Python bellekte aynı içerikteki stringleri tek kez saklayabilir."}, {"q": "\"Python\"[::-1] ne döndürür?", "opts": ["Python", "nohtyP", "Pytho", "Hata"], "ans": 1, "exp": "[::-1] stringi ters çevirir. Adım -1 = sondan başa git."}, {"q": "Döngüde string birleştirmek için hanisi daha hızlı?", "opts": ["str1 += str2", "str1 = str1 + str2", "\"\".join(liste)", "Hepsi aynı"], "ans": 2, "exp": "\"\".join(liste) O(n) zamanda çalışır. += her adımda yeni string oluşturduğu için O(n²)'dir."}, {"q": "f\"{puan:.2f}\" ne gösterir?", "opts": ["2 anlamlı rakam", "2 ondalık basamak", "Yüzde formatı", "Hata"], "ans": 1, "exp": ":.2f = float formatı, 2 ondalık basamak. Örn: 3.14159 → 3.14."}, {"q": "'hello'[2:] ne döndürür?", "opts": ["'he'", "'llo'", "'ell'", "'hello'"], "ans": 1, "exp": "[2:] = indeks 2'den sona: l,l,o = 'llo'"}], "fills": [{"code": "s = <span class=\"st\">\"Python\"</span>\nprint(s[<input class=\"blank\" data-ans=\"-1\" placeholder=\"?\" style=\"width:30px\">])  <span class=\"cm\"># n — son karakter</span>", "hint": "Son karakter için negatif indeks"}, {"code": "s = <span class=\"st\">\"Merhaba\"</span>\nprint(s[<input class=\"blank\" data-ans=\":\" placeholder=\"?\" style=\"width:22px\">:<span class=\"nm\">3</span>])  <span class=\"cm\"># Mer</span>", "hint": "Baştan 3'e kadar — dilimleme"}, {"code": "s = <span class=\"st\">\"Python\"</span>\nprint(s[<input class=\"blank\" data-ans=\"::-1\" placeholder=\"?\" style=\"width:50px\">])  <span class=\"cm\"># nohtyP</span>", "hint": "Ters dilim — iki nokta ve -1"}, {"code": "<span class=\"cm\"># join ile birleştir</span>\nparcalar = [<span class=\"st\">\"a\"</span>, <span class=\"st\">\"b\"</span>, <span class=\"st\">\"c\"</span>]\nprint(<span class=\"st\">\"-\"</span>.<input class=\"blank\" data-ans=\"join\" placeholder=\"?\" style=\"width:50px\">(parcalar))", "hint": "Birleştirme metodu"}, {"code": "s = <span class=\"st\">\"Python\"</span>\n<span class=\"fn\">print</span>(s[<input class=\"blank\" data-ans=\"::-1\" placeholder=\"?\" style=\"width:50px\">])  <span class=\"cm\"># ters çevir</span>", "hint": "Negatif adım dilimleme"}], "drag": [{"code": "\"Python\"[<span class=\"hl\">___</span>]  →  \"n\" (son harf)", "ans": "-1", "opts": ["-1", "5", "0", "-2", "6"], "exp": "Negatif indeks sondan sayar: -1 son karakter"}, {"code": "\"Python\"[1:4]  →  <span class=\"hl\">___</span>", "ans": "\"yth\"", "opts": ["\"yth\"", "\"Pyt\"", "\"hon\"", "\"ytho\"", "\"ython\""], "exp": "[1:4] → indeks 1,2,3 = y,t,h (4 dahil değil)"}, {"code": "\"Python\"[::<span class=\"hl\">___</span>]  →  \"nohtyP\"", "ans": "-1", "opts": ["-1", "1", "2", "-2", "0"], "exp": "Negatif adım stringi tersine çevirir"}, {"code": "\"a-b-c\".split(<span class=\"hl\">___</span>)  →  [a,b,c]", "ans": "\"-\"", "opts": ["\"-\"", "\".\"", "\" \"", "\",\"", "\"\""], "exp": "split() verilen ayırıcıya göre parçalar"}, {"code": "Döngüde birleştirme O(n): <span class=\"hl\">___</span>", "ans": "join()", "opts": ["join()", "+=", "+", "format()", "append()"], "exp": "join() O(n) verimli; += O(n²) bellek kullanır"}], "code": {"task": "Şifre güç analizörü yaz: bir şifre string'i üzerinden uzunluğunu, büyük harf var mı, küçük harf var mı, rakam var mı kontrol et. f-string ile detaylı rapor ver.", "starter": "sifre = \"PyLab2024!\"\n\nuzunluk = len(sifre)\nbuyuk_var = any(c.isupper() for c in sifre)\nkucuk_var = any(c.islower() for c in sifre)\nrakam_var = any(c.isdigit() for c in sifre)\nozel_var = any(not c.isalnum() for c in sifre)\n\n# Puanla\npuan = sum([uzunluk >= 8, buyuk_var, kucuk_var, rakam_var, ozel_var])\n\nprint(f\"Şifre: {sifre}\")\nprint(f\"Uzunluk: {uzunluk} karakter\")\nprint(f\"Büyük harf: {'✅' if buyuk_var else '❌'}\")\nprint(f\"Küçük harf: {'✅' if kucuk_var else '❌'}\")\nprint(f\"Rakam: {'✅' if rakam_var else '❌'}\")\nprint(f\"Özel karakter: {'✅' if ozel_var else '❌'}\")\nprint(f\"Güç puanı: {puan}/5\")\n", "hint": "any(c.isupper() for c in sifre) — şifredeki her karakteri kontrol eder, büyük harf varsa True.", "checkFn": "(code)=>{\n      const hasLen=code.includes('len(');\n      const hasFStr=code.includes('f\"') || code.includes(\"f'\");\n      const hasCheck=code.includes('isupper') || code.includes('islower') || code.includes('isdigit') || code.includes('any(');\n      const hasPuan=code.includes('puan') || code.includes('puan');\n      let p=(hasLen?2:0)+(hasFStr?3:0)+(hasCheck?3:0)+(hasPuan?2:0);\n      return {pts:p,max:10,ok:p>=6,msg:p>=8?'Güvenlik uzmanı! 🔐':p>=6?'Şifre analizi tamam!':'len(), string metodları ve f-string kullan.'};\n    }"}}]}, {"id": "m3", "label": "Koleksiyonlar", "icon": "📦", "color": "#f78c6c", "comingSoon": true}, {"id": "m4", "label": "OOP & Sınıflar", "icon": "🔷", "color": "#89ddff", "comingSoon": true}]};
