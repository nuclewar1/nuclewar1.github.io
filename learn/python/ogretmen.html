<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PyLab — Öğretmen Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1320;--s1:#161c2e;--s2:#1e2740;--s3:#232d45;
  --border:#2c3655;--border2:#3d4e7a;
  --text:#eaedff;--muted:#8090c0;--muted2:#adb5d8;
  --amber:#f0a500;--green:#3dd68c;--green-bg:rgba(61,214,140,.1);
  --red:#f25f5c;--red-bg:rgba(242,95,92,.12);
  --blue:#6184f0;--purple:#c4aaee;--cyan:#3dd6c8;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header-logo{font-size:22px}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.key-pill{font-size:11px;color:var(--muted);padding:4px 9px;background:var(--s2);border-radius:6px;border:1px solid var(--border);font-family:monospace}
.btn{padding:7px 13px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;font-size:12px;font-weight:600}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn-primary{background:var(--amber);color:#080b12;border-color:var(--amber)}
.btn-primary:hover{opacity:.85;color:#080b12}

.main{max-width:1100px;margin:0 auto;padding:22px 18px}

/* stat cards */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-val{font-size:26px;font-weight:800;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.stat-bar{height:3px;border-radius:2px;margin-top:9px;background:var(--s3)}
.stat-fill{height:100%;border-radius:2px}

/* section */
.sec{background:var(--s1);border:1px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden}
.sec-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sec-title{font-size:13px;font-weight:700;flex:1}
.badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700}
.b-warn{background:rgba(240,165,0,.15);color:var(--amber)}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-err{background:var(--red-bg);color:var(--red)}
.b-info{background:rgba(97,132,240,.12);color:var(--blue)}

/* module accordion */
.mod-row{border-bottom:1px solid var(--border)}
.mod-row:last-child{border-bottom:none}
.mod-header{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none}
.mod-header:hover{background:var(--s2)}
.mod-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mod-label{font-size:13px;font-weight:600;flex:1}
.mod-meta{font-size:11px;color:var(--muted)}
.mod-skip{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(240,165,0,.12);color:var(--amber);font-weight:700;margin-left:6px}
.mod-chev{font-size:11px;color:var(--muted);transition:transform .2s}
.mod-chev.open{transform:rotate(90deg)}
.mod-lessons{display:none;padding:0 0 4px}
.mod-lessons.open{display:block}

/* lesson rows */
.lesson-row{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 36px;border-bottom:1px solid rgba(44,54,85,.4)}
.lesson-row:last-child{border-bottom:none}
.lesson-row:hover{background:var(--s2)}
.l-num{font-size:10px;color:var(--muted);font-family:monospace;width:22px;flex-shrink:0}
.l-icon{font-size:14px;width:20px;text-align:center}
.l-title{font-size:12px;font-weight:500;flex:1}
.l-badges{display:flex;gap:4px;align-items:center;flex-shrink:0}
.l-score{font-size:11px;font-family:monospace;font-weight:700;min-width:30px;text-align:right}
.phases{display:flex;gap:3px}
.ph{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ph.done{opacity:1}
.ph.miss{opacity:.2;background:var(--border2)!important}
.badge-skip{font-size:9px;padding:1px 5px;border-radius:5px;background:rgba(240,165,0,.15);color:var(--amber);font-weight:700}
.badge-done{font-size:9px;padding:1px 5px;border-radius:5px;background:var(--green-bg);color:var(--green);font-weight:700}
.badge-partial{font-size:9px;padding:1px 5px;border-radius:5px;background:rgba(97,132,240,.12);color:var(--blue);font-weight:700}
.badge-virgin{font-size:9px;padding:1px 5px;border-radius:5px;background:var(--s3);color:var(--muted);font-weight:600}

/* phase legend */
.phase-legend{display:flex;gap:14px;padding:9px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.pl{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.pl-dot{width:8px;height:8px;border-radius:50%}

/* alert list */
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(44,54,85,.4)}
.alert-row:last-child{border-bottom:none}
.alert-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.alert-label{font-size:12px;font-weight:600}
.alert-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* phase breakdown */
.phase-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px 16px}
.phase-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.phase-val{font-size:20px;font-weight:800}
.phase-lbl{font-size:10px;color:var(--muted);margin-top:3px}
.phase-pct{font-size:10px;margin-top:4px}
.phase-mini-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px}
.phase-mini-fill{height:100%;border-radius:2px}

/* debug */
.debug-box{font-size:11px;font-family:monospace;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--muted);line-height:1.7;margin-bottom:16px;white-space:pre-wrap;word-break:break-all}

.empty-state{padding:48px;text-align:center}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--muted);line-height:1.6}

.loader{padding:48px;text-align:center;color:var(--muted);font-size:13px}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .phase-grid{grid-template-columns:repeat(3,1fr)}
  .main{padding:14px 12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🐍</div>
  <div>
    <div class="header-title">Öğretmen Paneli</div>
    <div class="header-sub">PyLab öğrenci ilerleme takibi</div>
  </div>
  <div class="header-right">
    <span class="key-pill" id="key-label">—</span>
    <button class="btn" onclick="toggleDebug()">🔍 Debug</button>
    <button class="btn btn-primary" onclick="init()">↻ Yenile</button>
  </div>
</div>

<div class="main">
  <div id="debug-panel" style="display:none"></div>
  <div id="root"><div class="loader">⏳ Yükleniyor...</div></div>
</div>

<!-- Kurs scriptlerini yükle (index.html ile aynı klasörde) -->
<script src="course.js"></script>
<script src="modules/m0.js"></script>
<script src="modules/m1.js"></script>
<script src="modules/m2.js"></script>
<script src="modules/m3.js"></script>
<script src="modules/m4.js"></script>
<script src="modules/m5.js"></script>
<script src="modules/m6.js"></script>
<script src="modules/m7.js"></script>
<script src="modules/m8.js"></script>
<script src="modules/m9.js"></script>

<script>
const PHASE_COLORS = ['#6184f0','#c4aaee','#3dd68c','#f0a500','#3dd6c8'];
const PHASE_NAMES  = ['Ders','Quiz','Seç','Boşluk','Kod'];  // Sıra: 0=lesson 1=quiz 2=drag(seç) 3=fills(boşluk) 4=code

var MODULES = [], LESSONS = [], STORAGE_KEY = 'axyon-python-v1';
var _debugLog = [];

function log(msg){ _debugLog.push(msg); console.log('[OgretmenPanel]', msg); }

/* ── KURS VERİSİNİ YÜKLEMEyİ DENE ── */
function buildCourseData(){
  var course = window.AXYON_COURSE;
  if(!course){ log('AXYON_COURSE bulunamadı'); return false; }

  STORAGE_KEY = (course.meta && course.meta.storageKey) || 'axyon-python-v1';
  log('Storage key: ' + STORAGE_KEY);

  MODULES = []; LESSONS = [];
  (course.modules || []).forEach(function(mod){
    var data = window[mod.varName];
    if(!data){ log('Modül yok: ' + mod.varName); return; }
    var m = { id: data.id || mod.id, label: data.label || mod.id, icon: data.icon || '📦', color: data.color || '#888' };
    MODULES.push(m);
    (data.lessons || []).forEach(function(l){
      LESSONS.push(Object.assign({}, l, { moduleId: m.id }));
    });
    log('Modül yüklendi: ' + m.label + ' (' + (data.lessons||[]).length + ' ders)');
  });
  log('Toplam: ' + MODULES.length + ' modül, ' + LESSONS.length + ' ders');
  return true;
}

/* ── STORAGE'DAN VERİ OKU ── */
function readState(){
  // Olası tüm keyleri dene
  var keys = [STORAGE_KEY, 'axyon-python-v1', 'axyon-learn-v1', 'axyon-pylab-v1'];
  var found = null, foundKey = null;
  keys.forEach(function(k){
    if(found) return;
    try {
      var raw = localStorage.getItem(k);
      if(raw){ found = JSON.parse(raw); foundKey = k; log('Veri bulundu: ' + k + ' (' + raw.length + ' byte)'); }
    } catch(e){ log('Parse hata (' + k + '): ' + e.message); }
  });
  if(!found){ log('Hiçbir keyde veri yok. localStorage keys: ' + Object.keys(localStorage).join(', ')); }
  return { state: found, key: foundKey };
}

/* ── SKOR HESAPLA ── */
function computeScore(p){
  if(!p || !p.scores) return 0;
  var v = p.scores.filter(function(s){ return s !== null; });
  return v.length ? Math.round(v.reduce(function(a,b){ return a+b; },0) / 5) : 0;
}

/* ── ANA RENDER ── */
function init(){
  _debugLog = [];
  var ok = buildCourseData();
  var result = readState();
  var S = result.state;
  var usedKey = result.key || STORAGE_KEY;

  document.getElementById('key-label').textContent = usedKey;

  if(!S){
    document.getElementById('root').innerHTML = '<div class="empty-state">'
      + '<div class="empty-icon">📭</div>'
      + '<div class="empty-title">Henüz veri yok</div>'
      + '<div class="empty-sub">Öğrenci PyLab\'ı henüz açmamış veya farklı bir tarayıcı kullanıyor.<br><br>'
      + 'Denenecek keyler: ' + ['axyon-python-v1','axyon-learn-v1'].join(', ') + '<br>'
      + 'Mevcut localStorage keyleri: <code>' + Object.keys(localStorage).join(', ') + '</code></div>'
      + '</div>';
    updateDebug();
    return;
  }

  renderReport(S, ok);
  updateDebug();
}

function renderReport(S, courseLoaded){
  var prog = S.progress || {};
  // Gerçekten girilmiş dersler: en az 1 faz tamamlanmış veya skor > 0
  var allIds    = Object.keys(prog);
  var lessonIds = allIds.filter(function(id){
    var p = prog[id];
    var doneCnt = p.done ? p.done.filter(Boolean).length : 0;
    var scored  = p.scores ? p.scores.some(function(s){ return s !== null && s > 0; }) : false;
    return doneCnt > 0 || scored;
  });
  var totalXP   = S.totalXP || 0;
  var streak    = S.streak  || 0;
  var root      = document.getElementById('root');

  if(lessonIds.length === 0){
    root.innerHTML = '<div class="empty-state">'
      + '<div class="empty-icon">🌱</div>'
      + '<div class="empty-title">Henüz ders girilmemiş</div>'
      + '<div class="empty-sub">Veri depolama çalışıyor ancak öğrenci henüz hiçbir derse girmemiş.</div>'
      + '</div>';
    return;
  }

  /* ── İstatistikler ── */
  var completed=0, skipped=0, quizMissed=[], skipList=[], partialList=[];
  lessonIds.forEach(function(id){
    var p = prog[id];
    var sc = computeScore(p);
    var doneCnt = p.done ? p.done.filter(Boolean).length : 0;
    var isSkipped = p.skipped === true;
    var quizDone  = p.done && p.done[1];

    if(sc >= 50) completed++;
    if(isSkipped){ skipped++; skipList.push(id); }
    if(!quizDone && doneCnt > 0) quizMissed.push(id);
    if(doneCnt > 0 && sc < 50) partialList.push(id);
  });

  var avgScore = lessonIds.length
    ? Math.round(lessonIds.reduce(function(s,id){ return s+computeScore(prog[id]); },0) / lessonIds.length)
    : 0;

  /* ── HTML ── */
  var html = '';

  // stat kartlar
  html += '<div class="stats-row">'
    + statCard(totalXP,'Toplam XP','#f0a500',500)
    + statCard(streak,'Günlük Seri','#3dd6c8',30)
    + statCard(lessonIds.length,'Aktif Ders','#6184f0', LESSONS.length||110)
    + statCard(completed,'Tamamlanan','#3dd68c',lessonIds.length)
    + statCard(skipped,'Atlamalar','#f0a500',lessonIds.length)
    + statCard(avgScore + '%','Ort. Skor','#c4aaee',100)
    + '</div>';

  // uyarılar
  var alerts = [];
  if(skipped) alerts.push({icon:'⚡',cls:'b-warn',label:skipped+' ders atlanarak girildi',sub:'Sırasız erişim: '+skipList.join(', ')});
  if(quizMissed.length) alerts.push({icon:'📝',cls:'b-err',label:quizMissed.length+' derste quiz yapılmamış',sub:'Ders okunmuş ama test aşamaları atlanmış: '+quizMissed.slice(0,6).join(', ')+(quizMissed.length>6?'…':'')});
  if(partialList.length) alerts.push({icon:'⏳',cls:'b-info',label:partialList.length+' ders yarım kaldı',sub:'Başlandı ancak %50 eşiği geçilmedi'});

  if(alerts.length){
    html += '<div class="sec"><div class="sec-head"><span>⚠️</span><div class="sec-title">Dikkat Gerektiren Durumlar</div>'
      + '<span class="badge b-warn">'+alerts.length+' uyarı</span></div>';
    alerts.forEach(function(a){
      html += '<div class="alert-row"><div class="alert-icon">'+a.icon+'</div><div><div class="alert-label">'+a.label+'</div><div class="alert-sub">'+a.sub+'</div></div></div>';
    });
    html += '</div>';
  }

  // Modül bazlı accordion
  html += '<div class="sec"><div class="sec-head"><span>📚</span><div class="sec-title">Modül & Ders Detayı</div>'
    + '<span class="badge b-ok">'+lessonIds.length+' kayıt</span></div>'
    + '<div class="phase-legend">';
  PHASE_NAMES.forEach(function(n,i){
    html += '<div class="pl"><div class="pl-dot" style="background:'+PHASE_COLORS[i]+'"></div>'+n+'</div>';
  });
  html += '</div>';

  if(courseLoaded && MODULES.length){
    // Modül grupları
    var grouped = {};
    LESSONS.forEach(function(l){ if(!grouped[l.moduleId]) grouped[l.moduleId]=[]; grouped[l.moduleId].push(l); });

    MODULES.forEach(function(mod, mi){
      var ls = grouped[mod.id] || [];
      var trackedLs = ls.filter(function(l){
        var p = prog[l.id];
        if(!p) return false;
        var doneCnt = p.done ? p.done.filter(Boolean).length : 0;
        var scored  = p.scores ? p.scores.some(function(s){ return s !== null && s > 0; }) : false;
        return doneCnt > 0 || scored;
      });
      if(!trackedLs.length && !prog[mod.id]) return; // modüle hiç girilmemiş

      var modDone   = trackedLs.filter(function(l){ return computeScore(prog[l.id])>=50; }).length;
      var modSkip   = trackedLs.filter(function(l){ return prog[l.id] && prog[l.id].skipped; }).length;
      var pct       = ls.length ? Math.round(modDone/ls.length*100) : 0;
      var openId    = 'mod_'+mod.id;

      html += '<div class="mod-row"><div class="mod-header" onclick="toggleMod(\''+openId+'\')">'
        + '<div class="mod-dot" style="background:'+mod.color+'"></div>'
        + '<span style="font-size:16px;margin-right:2px">'+mod.icon+'</span>'
        + '<span class="mod-label">'+mod.label+'</span>'
        + '<span class="mod-meta">'+trackedLs.length+' girildi · '+modDone+' tamamlandı · %'+pct+'</span>'
        + (modSkip ? '<span class="mod-skip">⚡ '+modSkip+' atlama</span>' : '')
        + '<span class="mod-chev" id="chev_'+openId+'">▶</span>'
        + '</div>'
        + '<div class="mod-lessons" id="'+openId+'">';

      ls.forEach(function(l, li){
        var p   = prog[l.id];
        var sc  = p ? computeScore(p) : 0;
        var isSkip = p && p.skipped;
        var doneCnt = p && p.done ? p.done.filter(Boolean).length : 0;
        var dots = '';
        for(var i=0;i<5;i++){
          var d = p && p.done && p.done[i];
          dots += '<div class="ph '+(d?'done':'miss')+'" style="background:'+PHASE_COLORS[i]+'" title="'+PHASE_NAMES[i]+'"></div>';
        }
        var scoreCol = sc>=70?'var(--green)':sc>=40?'var(--amber)':sc>0?'var(--red)':'var(--muted)';
        var statusBadge = !p ? '<span class="badge-virgin">—</span>'
          : sc>=50 ? '<span class="badge-done">✓</span>'
          : doneCnt>0 ? '<span class="badge-partial">½</span>'
          : '<span class="badge-virgin">—</span>';
        if(isSkip) statusBadge += ' <span class="badge-skip">⚡ Atlama</span>';

        html += '<div class="lesson-row">'
          + '<div class="l-num">'+(li+1)+'</div>'
          + '<div class="l-icon">'+l.icon+'</div>'
          + '<div class="l-title">'+l.title+'</div>'
          + '<div class="l-badges"><div class="phases">'+dots+'</div></div>'
          + '<div class="l-badges">'+statusBadge+'</div>'
          + '<div class="l-score" style="color:'+scoreCol+'">'+(sc>0?sc+'%':'—')+'</div>'
          + '</div>';
      });
      html += '</div></div>';
    });

  } else {
    // Kurs scripti yüklenemediyse ham ID listesi
    html += '<div style="padding:12px 16px;font-size:12px;color:var(--muted)">⚠️ Ders başlıkları yüklenemedi — ham ID gösteriliyor</div>';
    lessonIds.forEach(function(id, idx){
      var p = prog[id]; var sc = computeScore(p);
      var isSkip = p && p.skipped;
      html += '<div class="lesson-row">'
        + '<div class="l-num">'+(idx+1)+'</div>'
        + '<div class="l-icon">📌</div>'
        + '<div class="l-title">'+id+'</div>'
        + '<div class="l-score" style="color:'+(sc>=50?'var(--green)':sc>0?'var(--amber)':'var(--muted)')+'">'+( sc>0?sc+'%':'—')+'</div>'
        + (isSkip?'<span class="badge-skip">⚡</span>':'')
        + '</div>';
    });
  }
  html += '</div>';

  // Aşama özeti
  html += '<div class="sec"><div class="sec-head"><span>🧩</span><div class="sec-title">Aşama Tamamlama Analizi</div></div><div class="phase-grid">';
  PHASE_NAMES.forEach(function(name,i){
    var cnt  = lessonIds.filter(function(id){ return prog[id].done && prog[id].done[i]; }).length;
    var pct  = lessonIds.length ? Math.round(cnt/lessonIds.length*100) : 0;
    html += '<div class="phase-card">'
      + '<div class="phase-val" style="color:'+PHASE_COLORS[i]+'">'+cnt+'</div>'
      + '<div class="phase-lbl">'+name+'</div>'
      + '<div class="phase-pct" style="color:var(--muted)">%'+pct+'</div>'
      + '<div class="phase-mini-bar"><div class="phase-mini-fill" style="width:'+pct+'%;background:'+PHASE_COLORS[i]+'"></div></div>'
      + '</div>';
  });
  html += '</div></div>';

  // footer
  html += '<div style="text-align:center;padding:20px;font-size:11px;color:var(--muted)">'
    + 'Son güncelleme: '+new Date().toLocaleString('tr-TR')+' · localStorage["'+STORAGE_KEY+'"]'
    + '</div>';

  root.innerHTML = html;
}

function statCard(val, lbl, color, max){
  var pct = (max && typeof val==='number') ? Math.min(100,Math.round(val/max*100)) : 0;
  return '<div class="stat">'
    + '<div class="stat-val" style="color:'+color+'">'+val+'</div>'
    + '<div class="stat-lbl">'+lbl+'</div>'
    + (pct ? '<div class="stat-bar"><div class="stat-fill" style="width:'+pct+'%;background:'+color+'"></div></div>' : '')
    + '</div>';
}

function toggleMod(id){
  var el   = document.getElementById(id);
  var chev = document.getElementById('chev_'+id);
  if(!el) return;
  var open = el.classList.toggle('open');
  if(chev) chev.classList.toggle('open', open);
}

function toggleDebug(){
  var el = document.getElementById('debug-panel');
  el.style.display = el.style.display==='none' ? 'block' : 'none';
  updateDebug();
}

function updateDebug(){
  var el = document.getElementById('debug-panel');
  var lsKeys = Object.keys(localStorage);
  el.innerHTML = '<div class="debug-box">'
    + '=== localStorage keyleri ===\n' + lsKeys.join('\n') + '\n\n'
    + '=== Log ===\n' + _debugLog.join('\n') + '\n\n'
    + '=== MODULES ===\n' + MODULES.map(function(m){return m.icon+' '+m.label+' ('+m.id+')'}).join('\n') + '\n\n'
    + '=== LESSONS ===\n' + LESSONS.length + ' ders yüklendi'
    + '</div>';
}

/* DOMContentLoaded yerine kurs scriptlerinin yüklenmesini bekle */
window.addEventListener('load', function(){
  setTimeout(init, 100); // scriptler yüklendikten sonra
});
</script>
</body>
</html>
