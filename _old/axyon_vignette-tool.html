<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vignette Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111113;
    --surface: #1a1a1e;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #e8c84a;
    --accent2: #c4a832;
    --text: #e8e8ec;
    --muted: #888890;
    --danger: #e85a5a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
    gap: 24px;
  }

  header {
    width: 100%;
    max-width: 960px;
    display: flex;
    align-items: baseline;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .workspace {
    width: 100%;
    max-width: 960px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 20px;
    align-items: start;
  }

  /* DROP ZONE */
  .drop-zone {
    aspect-ratio: 16/9;
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
    background: var(--surface);
    min-height: 200px;
  }

  .drop-zone.has-image {
    border-style: solid;
    border-color: var(--border);
    aspect-ratio: unset;
  }

  .drop-zone:hover { border-color: var(--accent); background: var(--surface2); }
  .drop-zone.drag-over { border-color: var(--accent); background: #1e1c0a; }

  .drop-zone canvas {
    display: block;
    max-width: 100%;
    max-height: 560px;
    border-radius: 4px;
  }

  .drop-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }

  .drop-hint svg { opacity: 0.4; }

  .drop-hint p {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }

  .drop-hint strong {
    display: block;
    font-size: 15px;
    color: var(--text);
    font-weight: 600;
  }

  /* PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
  }

  .control-label .val {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    min-width: 32px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-chip {
    width: 26px;
    height: 26px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    flex-shrink: 0;
  }

  .color-chip:hover { transform: scale(1.1); }
  .color-chip.active { border-color: var(--accent); }

  .custom-color-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .custom-color-wrap label {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  input[type=color] {
    -webkit-appearance: none;
    width: 36px;
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px;
    background: var(--surface2);
    cursor: pointer;
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  /* BUTTONS */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 5px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s, background 0.15s;
    width: 100%;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: var(--accent);
    color: #111;
  }

  .btn-primary:hover:not(:disabled) { background: #f0d255; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover:not(:disabled) { background: var(--border); }

  .btn-outline {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-outline:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

  .btn-group { display: flex; flex-direction: column; gap: 8px; }

  /* BG RESOLUTION PICKER */
  .res-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .res-btn {
    padding: 7px 6px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    transition: all 0.15s;
    text-align: center;
  }

  .res-btn:hover { color: var(--text); border-color: var(--muted); }
  .res-btn.active { background: #1e1c0a; border-color: var(--accent); color: var(--accent); }

  /* BG COLOR */
  .bg-color-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .bg-chip {
    width: 26px;
    height: 26px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }

  .bg-chip:hover { transform: scale(1.1); }
  .bg-chip.active { border-color: var(--accent); }

  /* STATUS */
  .status-bar {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
  }

  /* SHAPE TOGGLE */
  .shape-toggle {
    display: flex;
    gap: 6px;
  }

  .shape-btn {
    flex: 1;
    padding: 7px 6px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    transition: all 0.15s;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .shape-btn:hover { color: var(--text); border-color: var(--muted); }
  .shape-btn.active { background: #1e1c0a; border-color: var(--accent); color: var(--accent); }

  /* HIDDEN */
  #fileInput { display: none; }

  @media (max-width: 700px) {
    .workspace { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>VIGNETTE TOOL</h1>
  <span>by axy — transparent PNG & background export</span>
</header>

<div class="workspace">

  <!-- PREVIEW -->
  <div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-hint" id="dropHint">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p><strong>Resim Yükle</strong>Tıkla veya sürükle bırak<br>PNG, JPG, WEBP</p>
      </div>
      <canvas id="previewCanvas" style="display:none"></canvas>
    </div>
    <div class="status-bar" id="statusBar">— resim bekleniyor —</div>
  </div>

  <!-- PANEL -->
  <div class="panel">

    <!-- VIGNETTE -->
    <div>
      <div class="section-title">Vignette</div>

      <div class="control-group" style="margin-bottom:14px">
        <div class="control-label" style="margin-bottom:6px">Şekil</div>
        <div class="shape-toggle" id="shapeToggle">
          <button class="shape-btn active" data-shape="round">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>
            Elips
          </button>
          <button class="shape-btn" data-shape="rect">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="1"/></svg>
            Dikdörtgen
          </button>
        </div>
      </div>

      <div class="control-group">
        <div class="control-label">Yoğunluk <span class="val" id="intVal">60%</span></div>
        <input type="range" id="intensity" min="0" max="100" value="60">
      </div>

      <br>

      <div class="control-group">
        <div class="control-label">Yumuşaklık <span class="val" id="spreadVal">50%</span></div>
        <input type="range" id="spread" min="10" max="100" value="50">
      </div>

      <br>

      <div class="control-group">
        <div class="control-label">Renk</div>
        <div class="color-row" id="vigColorRow">
          <div class="color-chip active" data-color="#000000" style="background:#000000" title="Siyah"></div>
          <div class="color-chip" data-color="#ffffff" style="background:#ffffff;border-color:#333" title="Beyaz"></div>
          <div class="color-chip" data-color="#1a0a30" style="background:#1a0a30" title="Koyu Mor"></div>
          <div class="color-chip" data-color="#0a1a10" style="background:#0a1a10" title="Koyu Yeşil"></div>
          <div class="color-chip" data-color="#1a0808" style="background:#1a0808" title="Koyu Kırmızı"></div>
          <div class="color-chip" data-color="#0a1020" style="background:#0a1020" title="Gece Mavisi"></div>
        </div>
        <div class="custom-color-wrap">
          <label>Özel</label>
          <input type="color" id="vigColorPicker" value="#000000">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- EXPORT -->
    <div>
      <div class="section-title">Dışa Aktar</div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnPng" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Transparent PNG İndir
        </button>
        <button class="btn btn-outline" id="btnChangeImg" disabled>
          Resim Değiştir
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- BACKGROUND -->
    <div>
      <div class="section-title">Desktop Background</div>

      <div class="control-group" style="margin-bottom:12px">
        <div class="control-label" style="margin-bottom:6px">Çözünürlük</div>
        <div class="res-grid" id="resGrid">
          <div class="res-btn active" data-w="1920" data-h="1080">1920×1080</div>
          <div class="res-btn" data-w="2560" data-h="1440">2560×1440</div>
          <div class="res-btn" data-w="3840" data-h="2160">4K UHD</div>
          <div class="res-btn" data-w="1280" data-h="800">1280×800</div>
        </div>
      </div>

      <div class="control-group" style="margin-bottom:12px">
        <div class="control-label" style="margin-bottom:6px">Arkaplan Rengi</div>
        <div class="bg-color-row" id="bgColorRow">
          <div class="bg-chip active" data-color="#000000" style="background:#000000" title="Siyah"></div>
          <div class="bg-chip" data-color="#0d0d0d" style="background:#0d0d0d" title="Neredeyse Siyah"></div>
          <div class="bg-chip" data-color="#1a1a2e" style="background:#1a1a2e" title="Gece Mavisi"></div>
          <div class="bg-chip" data-color="#ffffff" style="background:#ffffff;border-color:#333" title="Beyaz"></div>
          <div class="bg-chip" data-color="#f0ede8" style="background:#f0ede8;border-color:#333" title="Krem"></div>
        </div>
        <div class="custom-color-wrap">
          <label>Özel</label>
          <input type="color" id="bgColorPicker" value="#000000">
        </div>
      </div>

      <div class="control-group" style="margin-bottom:14px">
        <div class="control-label">Ölçek <span class="val" id="scaleVal">80%</span></div>
        <input type="range" id="bgScale" min="10" max="100" value="80">
      </div>

      <button class="btn btn-secondary" id="btnBg" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Background İndir
      </button>
    </div>

  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
  const dropZone = document.getElementById('dropZone');
  const dropHint = document.getElementById('dropHint');
  const previewCanvas = document.getElementById('previewCanvas');
  const fileInput = document.getElementById('fileInput');
  const statusBar = document.getElementById('statusBar');

  const sliderIntensity = document.getElementById('intensity');
  const sliderSpread = document.getElementById('spread');
  const sliderBgScale = document.getElementById('bgScale');

  const btnPng = document.getElementById('btnPng');
  const btnBg = document.getElementById('btnBg');
  const btnChangeImg = document.getElementById('btnChangeImg');

  let originalImage = null;
  let vigColor = '#000000';
  let bgColor = '#000000';
  let bgW = 1920, bgH = 1080;
  let vigShape = 'round';

  // --- SHAPE TOGGLE ---
  document.getElementById('shapeToggle').querySelectorAll('.shape-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      vigShape = btn.dataset.shape;
      render();
    });
  });

  // --- DROP ZONE ---
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  btnChangeImg.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        originalImage = img;
        dropHint.style.display = 'none';
        dropZone.classList.add('has-image');
        previewCanvas.style.display = 'block';
        btnPng.disabled = false;
        btnBg.disabled = false;
        btnChangeImg.disabled = false;
        statusBar.textContent = `${img.naturalWidth} × ${img.naturalHeight} px — ${file.name}`;
        render();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // --- SLIDERS ---
  sliderIntensity.addEventListener('input', () => {
    document.getElementById('intVal').textContent = sliderIntensity.value + '%';
    render();
  });

  sliderSpread.addEventListener('input', () => {
    document.getElementById('spreadVal').textContent = sliderSpread.value + '%';
    render();
  });

  sliderBgScale.addEventListener('input', () => {
    document.getElementById('scaleVal').textContent = sliderBgScale.value + '%';
  });

  // --- VIG COLOR ---
  document.getElementById('vigColorRow').querySelectorAll('.color-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      vigColor = chip.dataset.color;
      document.getElementById('vigColorPicker').value = vigColor;
      render();
    });
  });

  document.getElementById('vigColorPicker').addEventListener('input', e => {
    vigColor = e.target.value;
    document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
    render();
  });

  // --- BG COLOR ---
  document.getElementById('bgColorRow').querySelectorAll('.bg-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.bg-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      bgColor = chip.dataset.color;
      document.getElementById('bgColorPicker').value = bgColor;
    });
  });

  document.getElementById('bgColorPicker').addEventListener('input', e => {
    bgColor = e.target.value;
    document.querySelectorAll('.bg-chip').forEach(c => c.classList.remove('active'));
  });

  // --- RESOLUTION ---
  document.getElementById('resGrid').querySelectorAll('.res-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      bgW = parseInt(btn.dataset.w);
      bgH = parseInt(btn.dataset.h);
    });
  });

  // --- RENDER (preview) ---
  function drawVignette(ctx, w, h) {
    const intensity = sliderIntensity.value / 100;
    const spread = sliderSpread.value / 100;

    const r = parseInt(vigColor.slice(1,3), 16);
    const g = parseInt(vigColor.slice(3,5), 16);
    const b = parseInt(vigColor.slice(5,7), 16);
    const rgba = (a) => `rgba(${r},${g},${b},${a})`;

    ctx.save();

    if (vigShape === 'round') {
      // Eliptik radial gradient
      const cx = w / 2, cy = h / 2;
      const rx = w * (0.35 + spread * 0.45);
      const ry = h * (0.35 + spread * 0.45);
      ctx.translate(cx, cy);
      ctx.scale(rx / Math.min(rx, ry), ry / Math.min(rx, ry));
      const r2 = Math.min(rx, ry);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r2);
      grad.addColorStop(0,   rgba(0));
      grad.addColorStop(0.5, rgba(0));
      grad.addColorStop(1,   rgba(intensity));
      ctx.fillStyle = grad;
      ctx.fillRect(
        -cx * (rx/Math.min(rx,ry)), -cy * (ry/Math.min(rx,ry)),
         w  * (rx/Math.min(rx,ry)),  h  * (ry/Math.min(rx,ry))
      );
    } else {
      // Dikdörtgen: 4 kenardan içe doğru linear gradient
      ctx.restore(); // save/restore'u her katman için ayrı yap
      const inset = Math.min(w, h) * (0.1 + spread * 0.55);
      const sides = [
        { x0:0, y0:0, x1:0, y1:inset,  rect:[0, 0, w, inset]   }, // üst
        { x0:0, y0:h, x1:0, y1:h-inset,rect:[0, h-inset, w, inset] }, // alt
        { x0:0, y0:0, x1:inset, y1:0,  rect:[0, 0, inset, h]   }, // sol
        { x0:w, y0:0, x1:w-inset, y1:0,rect:[w-inset, 0, inset, h] }, // sağ
      ];
      ctx.globalCompositeOperation = 'source-over';
      sides.forEach(s => {
        const grad = ctx.createLinearGradient(s.x0, s.y0, s.x1, s.y1);
        grad.addColorStop(0,   rgba(intensity));
        grad.addColorStop(1,   rgba(0));
        ctx.fillStyle = grad;
        ctx.fillRect(...s.rect);
      });
      return;
    }

    ctx.restore();
  }

  function render() {
    if (!originalImage) return;
    const img = originalImage;
    previewCanvas.width = img.naturalWidth;
    previewCanvas.height = img.naturalHeight;
    const ctx = previewCanvas.getContext('2d');
    ctx.clearRect(0, 0, img.naturalWidth, img.naturalHeight);
    ctx.drawImage(img, 0, 0);
    drawVignette(ctx, img.naturalWidth, img.naturalHeight);
  }

  // --- EXPORT: Transparent PNG ---
  btnPng.addEventListener('click', () => {
    if (!originalImage) return;
    const canvas = document.createElement('canvas');
    canvas.width = originalImage.naturalWidth;
    canvas.height = originalImage.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(originalImage, 0, 0);
    drawVignette(ctx, canvas.width, canvas.height);
    download(canvas, 'vignette.png');
  });

  // --- EXPORT: Background ---
  btnBg.addEventListener('click', () => {
    if (!originalImage) return;
    const canvas = document.createElement('canvas');
    canvas.width = bgW;
    canvas.height = bgH;
    const ctx = canvas.getContext('2d');

    // BG rengi
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, bgW, bgH);

    // Resmi ortala, ölçekle
    const scale = (sliderBgScale.value / 100);
    const maxW = bgW * scale;
    const maxH = bgH * scale;
    const ratio = Math.min(maxW / originalImage.naturalWidth, maxH / originalImage.naturalHeight);
    const dw = originalImage.naturalWidth * ratio;
    const dh = originalImage.naturalHeight * ratio;
    const dx = (bgW - dw) / 2;
    const dy = (bgH - dh) / 2;
    ctx.drawImage(originalImage, dx, dy, dw, dh);

    // Vignette tüm canvas üzerine
    drawVignette(ctx, bgW, bgH);

    download(canvas, `background_${bgW}x${bgH}.png`);
  });

  function download(canvas, filename) {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  }
</script>
</body>
